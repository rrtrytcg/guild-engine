<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Guild Engine</title>
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%;background:#0d0d1a;color:#e0e0f0;font-family:system-ui,-apple-system,sans-serif;font-size:14px;overflow:hidden}
  ::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:#2a2a3e;border-radius:4px}

  /* ── Layout ── */
  #app{display:flex;flex-direction:column;height:100vh}
  #topbar{height:48px;background:#0a0a14;border-bottom:1px solid #2a2a3e;display:flex;align-items:center;padding:0 16px;gap:12px;flex-shrink:0}
  #main{display:flex;flex:1;overflow:hidden}
  #left-panel{width:220px;flex-shrink:0;background:#13131f;border-right:1px solid #2a2a3e;display:flex;flex-direction:column;overflow-y:auto}
  #center{flex:1;overflow-y:auto;padding:16px}
  #right-panel{width:260px;flex-shrink:0;background:#13131f;border-left:1px solid #2a2a3e;display:flex;flex-direction:column;overflow-y:auto}

  /* ── Reusable ── */
  .section-label{font-size:9px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:#444460;padding:10px 14px 4px}
  .card{background:#1e1e2e;border:1px solid #2a2a3e;border-radius:10px;padding:12px;margin-bottom:8px}
  .badge{display:inline-flex;align-items:center;padding:2px 7px;border-radius:4px;font-size:10px;font-weight:600}
  .btn{border:none;border-radius:7px;font-size:11px;font-weight:600;padding:5px 12px;cursor:pointer;transition:opacity .1s}
  .btn:disabled{opacity:.35;cursor:not-allowed}
  .btn-primary{background:#7F77DD;color:#fff}
  .btn-primary:hover:not(:disabled){background:#534AB7}
  .btn-teal{background:#1D9E75;color:#fff}
  .btn-teal:hover:not(:disabled){background:#0F6E56}
  .btn-ghost{background:transparent;border:1px solid #2a2a3e;color:#8888aa}
  .btn-ghost:hover{border-color:#444460;color:#c0c0d8}
  .progress-bar-outer{background:#1a1a2e;border-radius:4px;height:6px;overflow:hidden}
  .progress-bar-inner{height:100%;border-radius:4px;transition:width .25s linear}
  .nav-btn{background:transparent;border:none;padding:6px 10px;border-radius:6px;color:#666680;font-size:12px;font-weight:500;cursor:pointer;display:flex;align-items:center;gap:6px}
  .nav-btn.active,.nav-btn:hover{background:#1e1e2e;color:#e0e0f0}
  .rarity-common{color:#B4B2A9} .rarity-uncommon{color:#5DCAA5} .rarity-rare{color:#378ADD} .rarity-epic{color:#7F77DD} .rarity-legendary{color:#EF9F27}
  .hero-card-header{width:100%;display:flex;justify-content:space-between;align-items:flex-start;gap:8px;background:transparent;border:none;color:inherit;text-align:left;cursor:pointer;padding:0}
  .hero-card-header:hover .hero-name{color:#ffffff}
  .equipment-grid{display:flex;flex-direction:column;gap:6px;margin-top:10px}
  .equipment-row{border:1px solid #2a2a3e;border-radius:8px;background:#171724;padding:8px}
  .equipment-row-head{display:flex;justify-content:space-between;align-items:center;gap:8px}
  .equipment-slot-label{font-size:11px;color:#c0c0d8;display:flex;align-items:center;gap:6px;font-weight:600}
  .equipment-slot-empty{color:#666680}
  .equipment-slot-value{font-size:11px;color:#e0e0f0;display:flex;align-items:center;gap:6px;flex-wrap:wrap}
  .equipment-mini-btn{border:none;background:#2a2a3e;color:#c0c0d8;border-radius:6px;width:20px;height:20px;line-height:20px;font-size:12px;cursor:pointer}
  .equipment-mini-btn:hover{background:#444460;color:#fff}
  .equipment-popover{margin-top:8px;border:1px solid #2a2a3e;background:#11111b;border-radius:8px;padding:8px}
  .equipment-preview{border:1px solid #2a2a3e;background:#171724;border-radius:8px;padding:8px;margin-bottom:8px}
  .equipment-option{width:100%;display:flex;justify-content:space-between;gap:8px;align-items:flex-start;border:1px solid #2a2a3e;background:#1a1a2e;color:#e0e0f0;border-radius:8px;padding:7px 8px;cursor:pointer;text-align:left}
  .equipment-option:hover{border-color:#7F77DD66;background:#202034}
  .equipment-option .item-meta{font-size:10px;color:#8888aa;margin-top:2px}
  .inventory-chip{display:inline-flex;align-items:center;gap:4px;border:1px solid #2a2a3e;border-radius:999px;padding:3px 8px;font-size:10px;background:#1a1a2e;color:#c0c0d8}
  .inventory-chip.material{opacity:.7;background:#171724;color:#8888aa}
  .inventory-chip.equipment{border-color:currentColor}
  #notification{position:fixed;top:56px;left:50%;transform:translateX(-50%);z-index:999;padding:8px 18px;border-radius:8px;font-size:12px;font-weight:600;pointer-events:none;opacity:0;transition:opacity .2s}
  #notification.show{opacity:1}
  #restart-modal{position:fixed;inset:0;z-index:1200;background:rgba(5,5,12,.78);display:none;align-items:center;justify-content:center;padding:16px}
</style>
</head>
<body>
<div id="app">

  <!-- Top bar -->
  <div id="topbar">
    <span id="game-title" style="font-size:13px;font-weight:700;color:#e0e0f0">Guild Engine</span>
    <span style="font-size:9px;font-weight:700;background:#7F77DD22;color:#7F77DD;border:1px solid #7F77DD44;border-radius:4px;padding:1px 5px;letter-spacing:.1em">RUNTIME</span>
    <div style="flex:1"></div>
    <button class="btn btn-ghost" id="btn-save" onclick="actions.saveGame()">Save</button>
    <button class="btn btn-ghost" id="btn-restart" onclick="promptRestart()" style="font-size:11px">Restart</button>
    <button class="btn btn-ghost" id="btn-back" onclick="goToEditor()" style="font-size:11px">← Editor</button>
  </div>

  <!-- Main layout -->
  <div id="main">

    <!-- Left: resources + nav -->
    <div id="left-panel">
      <div class="section-label">Resources</div>
      <div id="resources-list" style="padding:0 8px 8px"></div>
      <div style="border-top:1px solid #2a2a3e;margin-top:4px;padding:8px">
        <div class="section-label" style="padding:4px 6px">View</div>
        <button class="nav-btn active" id="nav-world" onclick="setScreen('world')">🌍 World</button>
        <button class="nav-btn" id="nav-expedition" onclick="setScreen('expedition')">⚔️ Expedition</button>
        <button class="nav-btn" id="nav-forge" onclick="setScreen('forge')">🔨 Forge</button>
      </div>
      <div style="padding:8px">
        <div class="section-label" style="padding:4px 6px">Acts</div>
        <div id="acts-list"></div>
      </div>
    </div>

    <!-- Center: screen content -->
    <div id="center">
      <div id="screen-world"></div>
      <div id="screen-expedition" style="display:none"></div>
      <div id="screen-forge" style="display:none"></div>
    </div>

    <!-- Right: heroes + event log -->
    <div id="right-panel">
      <div class="section-label">Heroes</div>
      <div id="heroes-list" style="padding:0 8px 8px"></div>
      <div style="border-top:1px solid #2a2a3e;padding:8px">
        <div class="section-label" style="padding:4px 6px">Event log</div>
        <div id="event-log" style="padding:0 2px"></div>
      </div>
      <div style="border-top:1px solid #2a2a3e;padding:8px">
        <div class="section-label" style="padding:4px 6px">Inventory</div>
        <div id="inventory-list" style="padding:0 2px 2px"></div>
      </div>
    </div>
  </div>
</div>

<div id="notification"></div>

<div id="restart-modal" role="dialog" aria-modal="true" aria-labelledby="restart-title" onclick="cancelRestart()">
  <div class="card" onclick="event.stopPropagation()" style="width:min(360px,100%);margin:0;background:#1e1e2e;border-color:#7F77DD44;box-shadow:0 18px 60px rgba(0,0,0,.45)">
    <div id="restart-title" style="font-size:16px;font-weight:700;color:#e0e0f0;margin-bottom:8px">Restart game?</div>
    <div style="font-size:12px;color:#8888aa;line-height:1.5">
      Are you sure you want to restart this run?
      <br/>
      Press <strong style="color:#e0e0f0">Y</strong> to restart or <strong style="color:#e0e0f0">N</strong> to cancel.
    </div>
    <div style="display:flex;gap:8px;justify-content:flex-end;margin-top:16px">
      <button class="btn btn-ghost" onclick="cancelRestart()">No</button>
      <button class="btn btn-primary" onclick="confirmRestart()">Yes, restart</button>
    </div>
  </div>
</div>

<!-- No-project warning (hidden until needed) -->
<div id="no-project" style="display:none;position:fixed;inset:0;background:#0d0d1a;align-items:center;justify-content:center;flex-direction:column;gap:16px">
  <div style="font-size:32px">⚔️</div>
  <div style="font-size:18px;font-weight:700;color:#e0e0f0">No project loaded</div>
  <div style="font-size:13px;color:#666680;text-align:center;max-width:360px">Drop a <code>project.json</code> exported from the Guild Engine editor onto this page, or click below.</div>
  <label style="cursor:pointer">
    <input type="file" accept=".json" id="file-picker" style="display:none"/>
    <span class="btn btn-primary" style="font-size:13px;padding:10px 24px">Load project.json</span>
  </label>
</div>

<script type="module">
import { initEngine, stopEngine, actions as engineActions } from './engine.js'
import { MIN_ACTION_DELAY_MS } from './systems/buildings.js'
window.actions = engineActions
const actions = engineActions
let snapshot = null
let currentProject = null
let restartConfirmOpen = false
const pendingActions = new Set()
const pendingActionTimers = new Map()
const ACTION_DELAY_MS = MIN_ACTION_DELAY_MS
const renderCache = {
  worldHash: null,
  expeditionHash: null,
}
let worldActionsBound = false
let expeditionActionsBound = false
let heroActionsBound = false

const EQUIPMENT_SLOTS = [
  { slot: 'weapon', icon: '⚔️', label: 'Weapon' },
  { slot: 'armor', icon: '🛡️', label: 'Armor' },
  { slot: 'accessory', icon: '💍', label: 'Accessory' },
  { slot: 'relic', icon: '🔮', label: 'Relic' },
]

const HERO_UI = {
  expandedHeroId: null,
  openSlotKey: null,
  hoveredItemId: null,
}
const heroUiState = HERO_UI
const expeditionUiState = {
  selectedPartyByExpedition: {},
}

const STAT_LABELS = {
  attack: 'ATK',
  defense: 'DEF',
  speed: 'SPD',
  hp: 'HP',
  luck: 'LCK',
}

const RARITY_ORDER = {
  common: 0,
  uncommon: 1,
  rare: 2,
  epic: 3,
  legendary: 4,
}

const RARITY_COLORS = {
  common: '#B4B2A9',
  uncommon: '#5DCAA5',
  rare: '#378ADD',
  epic: '#7F77DD',
  legendary: '#EF9F27',
}

// ── Load screen shown immediately ─────────────────────────────────────────────
const noProject = document.getElementById('no-project')
noProject.style.cssText = 'display:flex;position:fixed;inset:0;background:#0d0d1a;align-items:center;justify-content:center;flex-direction:column;gap:16px;z-index:100'

function loadFile(file) {
  if (!file) return
  const reader = new FileReader()
  reader.onload = (ev) => {
    try { startGame(JSON.parse(ev.target.result)) }
    catch (err) { alert('Could not parse project.json: ' + err.message) }
  }
  reader.readAsText(file)
}

document.getElementById('file-picker').addEventListener('change', (e) => loadFile(e.target.files?.[0]))
document.addEventListener('dragover', (e) => e.preventDefault())
document.addEventListener('drop', (e) => { e.preventDefault(); loadFile(e.dataTransfer.files?.[0]) })

function startGame(project) {
  currentProject = project
  stopEngine()
  noProject.style.display = 'none'
  hideRestartConfirm()
  document.getElementById('app').style.display = 'flex'
  document.getElementById('game-title').textContent = project.meta?.title ?? 'Guild Engine'
  document.title = project.meta?.title ?? 'Guild Engine'
  pendingActions.clear()
  for (const timer of pendingActionTimers.values()) clearTimeout(timer)
  pendingActionTimers.clear()
  heroUiState.expandedHeroId = null
  heroUiState.openSlotKey = null
  heroUiState.hoveredItemId = null
  expeditionUiState.selectedPartyByExpedition = {}
  renderCache.worldHash = null
  renderCache.expeditionHash = null
  snapshot = initEngine(project, (snap) => { snapshot = snap; render(snap) })
  render(snapshot)
}

window.goToEditor = () => { stopEngine(); window.history.back() }
window.promptRestart = () => showRestartConfirm()
window.cancelRestart = () => hideRestartConfirm()
window.confirmRestart = () => restartCurrentGame()
window.setScreen = (s) => { engineActions.setScreen(s); if (snapshot) render(snapshot) }
window.sendParty = (expedId, partySize) => {
  if (!snapshot) return
  const exp = snapshot.expeditions?.find((entry) => entry.id === expedId)
  const selectedParty = exp ? getExpeditionSelectedParty(snapshot, exp) : []
  actions.startExpedition(expedId, selectedParty)
}

document.addEventListener('keydown', (e) => {
  if (!restartConfirmOpen) return
  const key = e.key.toLowerCase()
  if (key === 'y') {
    e.preventDefault()
    restartCurrentGame()
  } else if (key === 'n' || key === 'escape') {
    e.preventDefault()
    hideRestartConfirm()
  }
})

// ── Master render ─────────────────────────────────────────────────────────────
const HERO_STATUS_META = {
  ready: { label: 'Ready', icon: '✓', color: '#1D9E75', bg: '#1D9E7522' },
  inspired: { label: 'Inspired', icon: '⚡', color: '#7F77DD', bg: '#7F77DD22' },
  exhausted: { label: 'Exhausted', icon: '😴', color: '#BA7517', bg: '#BA751722' },
  cursed: { label: 'Cursed', icon: '💀', color: '#8888aa', bg: '#44446022' },
  injured: { label: 'Injured', icon: '🩸', color: '#E24B4A', bg: '#E24B4A22' },
  dead: { label: 'Dead', icon: '✖', color: '#9999b8', bg: '#2a2a3e' },
}

const READINESS_META = {
  locked: { key: 'locked', label: 'Locked', icon: '🔒', color: '#666680' },
  empty: { key: 'empty', label: 'No heroes', icon: '•', color: '#444460' },
  WIPE: { key: 'WIPE', label: 'Wipe risk', icon: '💀', color: '#444444' },
  FAIL: { key: 'FAIL', label: 'Likely fail', icon: '✕', color: '#E24B4A' },
  NARROW_SUCCESS: { key: 'NARROW_SUCCESS', label: 'Risky', icon: '⚠', color: '#BA7517' },
  CLEAN_SUCCESS: { key: 'CLEAN_SUCCESS', label: 'Ready', icon: '✓', color: '#1D9E75' },
  DOMINANT: { key: 'DOMINANT', label: 'Dominant', icon: '★', color: '#EF9F27' },
}

const HERO_STATUS_ORDER = ['dead', 'injured', 'cursed', 'exhausted', 'inspired', 'ready']

function getHeroStatusList(hero) {
  const statuses = new Set(Array.isArray(hero?.statuses) ? hero.statuses.filter(Boolean) : [])
  if (hero?.status && hero.status !== 'ready') statuses.add(hero.status)
  if (!statuses.size) statuses.add('ready')
  return HERO_STATUS_ORDER.filter((status) => statuses.has(status))
}

function renderHeroStatusBadges(hero) {
  const statuses = getHeroStatusList(hero)
  return statuses.map((status) => {
    const meta = HERO_STATUS_META[status] ?? HERO_STATUS_META.ready
    return `<span class="badge" style="display:inline-flex;align-items:center;gap:4px;background:${meta.bg};color:${meta.color};border:1px solid ${meta.color}33">${meta.icon} ${meta.label}</span>`
  }).join('')
}

function renderReadinessBadge(readiness) {
  const meta = READINESS_META[readiness?.key] ?? READINESS_META.locked
  return `<span class="badge" style="display:inline-flex;align-items:center;gap:4px;background:${meta.color}22;color:${meta.color};border:1px solid ${meta.color}44">${meta.icon} ${meta.label}</span>`
}

function renderReadinessBar(readiness) {
  const color = readiness?.color ?? '#666680'
  const pct = Math.max(0, Math.min(100, readiness?.barPct ?? 0))
  const label = readiness?.locked
    ? 'Locked'
    : readiness?.key === 'empty'
      ? 'No heroes'
    : readiness?.shortParty
      ? `Partial party`
      : `Full party`
  return `<div style="margin-top:6px">
    <div class="progress-bar-outer" style="height:8px;margin-bottom:4px">
      <div class="progress-bar-inner" style="width:${pct}%;background:${color}"></div>
    </div>
    <div style="display:flex;justify-content:space-between;gap:8px;font-size:10px;color:${color}">
      <span>${readiness?.icon ?? ''} ${readiness?.label ?? 'Locked'}</span>
      <span>${label}</span>
    </div>
  </div>`
}

function renderReadinessParty(readiness) {
  const heroes = readiness?.partyHeroes ?? []
  if (!heroes.length) {
    return `<div style="font-size:10px;color:#444460;margin-top:6px">No eligible party members yet.</div>`
  }

  return `<div style="display:flex;flex-wrap:wrap;gap:4px;margin-top:6px">
    ${heroes.map((hero) => {
      const statuses = getHeroStatusList(hero)
      const primary = statuses[0] ?? 'ready'
      const meta = HERO_STATUS_META[primary] ?? HERO_STATUS_META.ready
      return `<span class="badge" style="background:${meta.bg};color:${meta.color};border:1px solid ${meta.color}33">${hero.name} &middot; Lv.${hero.level} &middot; ${meta.icon} ${meta.label}</span>`
    }).join('')}
  </div>`
}

function isHeroSelectableForExpedition(s, hero) {
  if (!hero || hero.status === 'dead') return false
  if (!['ready', 'inspired'].includes(hero.status)) return false
  return !(s.activeRuns ?? []).some((run) => !run.done && run.party?.includes(hero.id))
}

function getSelectableHeroesForExpedition(s) {
  return (s.heroes ?? []).filter((hero) => isHeroSelectableForExpedition(s, hero))
}

function getExpeditionSelectedParty(s, exp) {
  const partySize = exp.party_size ?? 0
  const stored = expeditionUiState.selectedPartyByExpedition[exp.id]
  if (!Array.isArray(stored)) return []

  const selectableIds = new Set(getSelectableHeroesForExpedition(s).map((hero) => hero.id))
  const next = stored.filter((heroId) => selectableIds.has(heroId)).slice(0, partySize)
  expeditionUiState.selectedPartyByExpedition[exp.id] = next
  return next
}

function setExpeditionSelectedParty(expId, party) {
  expeditionUiState.selectedPartyByExpedition[expId] = Array.from(new Set((party ?? []).filter(Boolean)))
}

function toggleExpeditionPartyMember(s, exp, heroId) {
  const current = getExpeditionSelectedParty(s, exp)
  const partySize = exp.party_size ?? 0
  if (current.includes(heroId)) {
    setExpeditionSelectedParty(exp.id, current.filter((id) => id !== heroId))
    return { ok: true }
  }

  if (current.length >= partySize) {
    return { ok: false, reason: `Party is full. ${partySize} heroes max.` }
  }

  setExpeditionSelectedParty(exp.id, [...current, heroId])
  return { ok: true }
}

function clearExpeditionParty(expId) {
  expeditionUiState.selectedPartyByExpedition[expId] = []
}

function autoFillExpeditionParty(s, exp) {
  setExpeditionSelectedParty(exp.id, s.selectExpeditionParty?.(exp.id) ?? [])
}

function syncExpeditionPartySelections(s) {
  for (const exp of s.expeditions ?? []) {
    getExpeditionSelectedParty(s, exp)
  }
}

function renderExpeditionPartyPicker(s, exp) {
  const selectedParty = getExpeditionSelectedParty(s, exp)
  const selectedHeroes = selectedParty
    .map((heroId) => s.heroes.find((hero) => hero.id === heroId))
    .filter(Boolean)
  const availableHeroes = getSelectableHeroesForExpedition(s)
  const partySize = exp.party_size ?? selectedHeroes.length

  const selectedHtml = selectedHeroes.length
    ? selectedHeroes.map((hero) => {
        const statuses = getHeroStatusList(hero)
        const primary = statuses[0] ?? 'ready'
        const meta = HERO_STATUS_META[primary] ?? HERO_STATUS_META.ready
        return `<button class="badge" data-action="remove-expedition-party" data-expedition-id="${exp.id}" data-hero-id="${hero.id}" style="background:${meta.bg};color:${meta.color};border:1px solid ${meta.color}33;cursor:pointer">
          ${hero.name} &middot; Lv.${hero.level} &middot; ${meta.icon} ${meta.label} <span style="margin-left:4px">×</span>
        </button>`
      }).join('')
    : '<div style="font-size:10px;color:#666680">No heroes selected yet.</div>'

  const availableHtml = availableHeroes.length
    ? availableHeroes.map((hero) => {
        const statuses = getHeroStatusList(hero)
        const primary = statuses[0] ?? 'ready'
        const meta = HERO_STATUS_META[primary] ?? HERO_STATUS_META.ready
        const isSelected = selectedParty.includes(hero.id)
        return `<button class="badge" data-action="toggle-expedition-party" data-expedition-id="${exp.id}" data-hero-id="${hero.id}" style="background:${isSelected ? `${meta.color}22` : '#1a1a2e'};color:${isSelected ? meta.color : '#c0c0d8'};border:1px solid ${isSelected ? `${meta.color}44` : '#2a2a3e'};cursor:pointer">
          ${hero.name} &middot; ${meta.icon} ${meta.label}
        </button>`
      }).join('')
    : '<div style="font-size:10px;color:#666680">No available heroes right now.</div>'

  return `<div style="margin-top:8px;padding:8px;border:1px solid #2a2a3e;border-radius:8px;background:#171724">
    <div style="display:flex;justify-content:space-between;align-items:center;gap:8px;margin-bottom:6px">
      <div style="font-size:10px;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;color:#666680">Choose party</div>
      <div style="font-size:10px;color:#8888aa">${selectedHeroes.length}/${partySize} selected</div>
    </div>
    <div style="display:flex;flex-wrap:wrap;gap:4px;margin-bottom:8px">${selectedHtml}</div>
    <div style="font-size:10px;color:#666680;margin-bottom:4px">Available heroes</div>
    <div style="display:flex;flex-wrap:wrap;gap:4px">${availableHtml}</div>
    <div style="display:flex;gap:6px;margin-top:8px;flex-wrap:wrap">
      <button class="btn btn-ghost" data-action="auto-fill-expedition-party" data-expedition-id="${exp.id}">Auto-fill</button>
      <button class="btn btn-ghost" data-action="clear-expedition-party" data-expedition-id="${exp.id}">Clear</button>
    </div>
  </div>`
}

function buildExpeditionGroups(s) {
  const expeditionById = new Map((s.expeditions ?? []).map((exp) => [exp.id, exp]))
  const assigned = new Set()
  const groupedActs = (s.acts ?? []).map((act) => {
    const expeditionIds = act.expedition_ids ?? []
    const expeditions = expeditionIds.map((id) => expeditionById.get(id)).filter(Boolean)
    for (const exp of expeditions) assigned.add(exp.id)

    const bossExpedition = act.boss_expedition_id ? expeditionById.get(act.boss_expedition_id) : null
    if (bossExpedition) assigned.add(bossExpedition.id)

    return { act, expeditions, bossExpedition }
  })

  const standalone = (s.expeditions ?? []).filter((exp) => !assigned.has(exp.id))
  return { groupedActs, standalone }
}

function renderExpeditionCard(s, exp, readiness, { boss = false, note = '' } = {}) {
  const onRun = (s.activeRuns ?? []).some((r) => !r.done)
  const selectedParty = getExpeditionSelectedParty(s, exp)
  const selectedReadiness = readiness
  const selectableCount = selectedParty.length
  const canSend = exp.visible && !onRun && selectableCount > 0
  const actionKey = getActionKey('start-expedition', exp.id)
  const pending = pendingActions.has(actionKey)
  const sendLabel = selectableCount > 0
    ? `Send ${selectableCount}${exp.party_size && selectableCount < exp.party_size ? `/${exp.party_size}` : ''} heroes`
    : 'Select a party'
  const buttonLabel = !exp.visible
    ? 'Locked'
    : pending
      ? 'Sending...'
      : onRun
        ? 'Run in progress'
        : sendLabel

  return `<div class="card" style="border-color:${exp.visible ? `${readiness?.color ?? '#2a2a3e'}44` : '#2a2a3e'};opacity:${exp.visible ? 1 : 0.92}">
    <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:10px;margin-bottom:6px">
      <div style="min-width:0">
        <div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap">
          <span style="font-weight:600">${exp.icon ?? '🗺️'} ${exp.label}</span>
          ${boss ? '<span class="badge" style="background:#E24B4A22;color:#E24B4A;border:1px solid #E24B4A44">BOSS</span>' : ''}
          ${!exp.visible ? '<span class="badge" style="background:#66668022;color:#666680;border:1px solid #66668044">LOCKED</span>' : ''}
        </div>
        <div style="font-size:10px;color:#666680;margin-top:2px">Lv.${exp.level ?? 1} · ${exp.duration_s ?? 0}s · Party ${exp.party_size ?? 0}</div>
      </div>
      <div style="text-align:right;flex-shrink:0">
        ${renderReadinessBadge(selectedReadiness)}
        <div style="font-size:10px;color:#666680;margin-top:3px">${selectableCount}/${exp.party_size ?? selectableCount} selected</div>
      </div>
    </div>
    ${renderReadinessBar(selectedReadiness)}
    ${renderReadinessParty(selectedReadiness)}
    ${renderExpeditionPartyPicker(s, exp)}
    <div style="font-size:11px;color:#666680;margin:8px 0 10px">${exp.visible ? (exp.description || 'No description provided.') : (note || exp.description || 'Locked.')}</div>
    <button class="btn ${canSend && !pending ? 'btn-primary' : 'btn-ghost'}" ${canSend && !pending ? '' : 'disabled'} data-action="start-expedition" data-expedition-id="${exp.id}" data-party-size="${exp.party_size}" data-action-key="${actionKey}">
      ${buttonLabel}
    </button>
  </div>`
}

function render(s) {
  renderResources(s)
  renderHeroesV2(s)
  renderEventLog(s)
  renderInventoryPanel(s)
  renderActs(s)
  renderNav(s)
  renderNotification(s)
  if (s.ui.screen === 'world') renderWorldScreen(s)
  if (s.ui.screen === 'expedition') renderExpeditionScreen(s)
  if (s.ui.screen === 'forge') renderForgeScreenV2(s)
}

// ── Resources (left panel) ────────────────────────────────────────────────────
function renderResources(s) {
  const el = document.getElementById('resources-list')
  const visible = s.resources.filter((r) => !r.is_material)
  if (!visible.length) { el.innerHTML = '<div style="font-size:11px;color:#444460;padding:8px 6px">No resources defined.</div>'; return }
  el.innerHTML = visible.map((r) => {
    const pct = r.cap > 0 ? Math.min(100, (r.amount / r.cap) * 100) : 0
    return `<div style="padding:8px 6px;cursor:pointer" onclick="actions.clickResource('${r.id}')">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px">
        <span style="font-size:12px;color:#c0c0d8">${r.icon ?? '💰'} ${r.label}</span>
        <span style="font-size:11px;color:#8888aa">${s.fmt(r.amount)}${r.cap > 0 ? '/' + s.fmt(r.cap) : ''}</span>
      </div>
      ${r.cap > 0 ? `<div class="progress-bar-outer"><div class="progress-bar-inner" style="width:${pct}%;background:#7F77DD"></div></div>` : ''}
      ${(r.effective_income ?? r.income) > 0 ? `<div style="font-size:10px;color:#444460;margin-top:2px">+${s.fmt(r.effective_income ?? r.income)}/s</div>` : ''}
    </div>`
  }).join('')
}

// ── Heroes (right panel) ──────────────────────────────────────────────────────
function getHeroClassForHero(s, hero) {
  return s.heroClasses.find((entry) => entry.id === hero.class_id)
}

function getSlotKey(heroId, slot) {
  return `${heroId}:${slot}`
}

function heroCanUseSlot(heroClass, slot) {
  return Array.isArray(heroClass?.slots) && heroClass.slots.includes(slot)
}

function getItemDefById(s, itemId) {
  return s.itemDefs?.[itemId] ?? null
}

function formatStatLabel(stat) {
  return STAT_LABELS[stat] ?? stat.slice(0, 3).toUpperCase()
}

function formatItemStatSummary(itemDef) {
  const entries = Object.entries(itemDef?.stat_modifiers ?? {}).filter(([, value]) => value)
  if (!entries.length) return 'No stat changes'
  return entries
    .map(([stat, value]) => `${value > 0 ? '+' : ''}${Math.round(value)} ${formatStatLabel(stat)}`)
    .join(', ')
}

function getInventoryItemsForSlot(s, hero, slot) {
  const heroClass = getHeroClassForHero(s, hero)
  if (!heroCanUseSlot(heroClass, slot)) return []

  return (s.inventory ?? [])
    .filter((entry) => entry.qty > 0 && entry.def?.subtype === 'equipment' && entry.def?.slot === slot)
    .slice()
    .sort((a, b) => {
      const rarityDelta = (RARITY_ORDER[b.def?.rarity ?? 'common'] ?? 0) - (RARITY_ORDER[a.def?.rarity ?? 'common'] ?? 0)
      if (rarityDelta !== 0) return rarityDelta
      return (a.def?.label ?? a.id).localeCompare(b.def?.label ?? b.id)
    })
}

function renderEquipmentDiff(hero, itemDef) {
  const diffs = Object.entries(itemDef?.stat_modifiers ?? {})
    .filter(([, value]) => value)
    .map(([stat, value]) => {
      const current = Number(hero.stats?.[stat] ?? 0)
      const next = current + value
      const delta = value > 0 ? `+${Math.round(value)}` : `${Math.round(value)}`
      return `<div style="font-size:10px;color:#5DCAA5">${formatStatLabel(stat)}: ${Math.round(current)} → ${Math.round(next)} (${delta})</div>`
    })

  return diffs.length
    ? diffs.join('')
    : '<div style="font-size:10px;color:#666680">No stat changes.</div>'
}

function renderEquipmentSelection(s, hero, slot) {
  const slotKey = getSlotKey(hero.id, slot)
  const items = getInventoryItemsForSlot(s, hero, slot)
  const hoveredItem = heroUiState.hoveredItemId ? items.find((entry) => entry.id === heroUiState.hoveredItemId) : null
  const previewHtml = hoveredItem
    ? `<div class="equipment-preview">
        <div style="font-size:10px;color:#666680;margin-bottom:4px">Preview</div>
        <div style="font-size:11px;font-weight:600;color:#e0e0f0;margin-bottom:4px">${hoveredItem.def?.icon ?? '📦'} ${hoveredItem.def?.label ?? hoveredItem.id}</div>
        ${renderEquipmentDiff(hero, hoveredItem.def)}
      </div>`
    : `<div class="equipment-preview"><div style="font-size:10px;color:#666680">Hover an item to preview stat changes.</div></div>`

  const itemHtml = items.length
    ? items.map((entry) => {
        const rarity = entry.def?.rarity ?? 'common'
        const borderColor = RARITY_COLORS[rarity] ?? '#2a2a3e'
        return `<button class="equipment-option" data-action="equip-item" data-hero-id="${hero.id}" data-item-id="${entry.id}" data-slot="${slot}" style="border-color:${borderColor}55">
          <div style="min-width:0">
            <div style="font-size:11px;font-weight:600;color:#e0e0f0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${entry.def?.icon ?? '📦'} ${entry.def?.label ?? entry.id}</div>
            <div class="item-meta">${formatItemStatSummary(entry.def)}</div>
          </div>
          <div style="flex-shrink:0;text-align:right">
            <div class="badge rarity-${rarity}" style="background:${borderColor}22;color:${borderColor};border:1px solid ${borderColor}44;margin-bottom:3px">x${entry.qty}</div>
          </div>
        </button>`
      }).join('')
    : `<div style="font-size:10px;color:#666680;padding:2px 0">No items available for this slot.</div>`

  return `<div class="equipment-popover" data-slot-popover="${slotKey}">
    ${previewHtml}
    <div style="display:flex;flex-direction:column;gap:6px">${itemHtml}</div>
  </div>`
}

function renderHeroes(s) {
  const el = document.getElementById('heroes-list')
  if (!s.heroes.length) { el.innerHTML = '<div style="font-size:11px;color:#444460;padding:8px 6px">No heroes yet.</div>'; return }
  const heroMarkup = s.heroes.map((hero) => {
    const heroClass = s.heroClasses.find((entry) => entry.id === hero.class_id)
    const heroStatuses = getHeroStatusList(hero)
    const primaryStatus = heroStatuses[0] ?? 'ready'
    const statusMeta = HERO_STATUS_META[primaryStatus] ?? HERO_STATUS_META.ready
    const xpNext = Math.max(1, hero.xp_next ?? 1)
    const xpPct = Math.max(0, Math.min(100, ((hero.xp ?? 0) / xpNext) * 100))
    return `<div class="card" style="margin:4px 6px 0">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:8px">
        <div style="min-width:0">
          <span style="font-size:12px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${hero.name}</span>
          <div style="font-size:10px;color:#666680">${heroClass?.label ?? '?'} &middot; Lv.${hero.level}</div>
        </div>
        <span class="badge" style="background:${statusMeta.bg};color:${statusMeta.color};border:1px solid ${statusMeta.color}33;flex-shrink:0">${statusMeta.icon} ${statusMeta.label}</span>
      </div>
      <div style="display:flex;gap:4px;flex-wrap:wrap;margin-top:6px">${renderHeroStatusBadges(hero)}</div>
      <div style="margin-top:8px">
        <div class="progress-bar-outer" style="height:8px;margin-bottom:4px"><div class="progress-bar-inner" style="width:${xpPct}%;background:#7F77DD"></div></div>
        <div style="font-size:10px;color:#666680">XP ${s.fmt(hero.xp ?? 0)} / ${s.fmt(xpNext)}</div>
      </div>
      <div style="display:flex;gap:6px;margin-top:6px;flex-wrap:wrap">
        ${Object.entries(hero.stats ?? {}).map(([k, v]) => `<span style="font-size:10px;color:#8888aa">${k.slice(0, 3).toUpperCase()} <strong style="color:#c0c0d8">${Math.round(v)}</strong></span>`).join('')}
      </div>
    </div>`
  }).join('')
  el.innerHTML = heroMarkup
  return
  el.innerHTML = s.heroes.map((h) => {
    const cls = s.heroClasses.find((c) => c.id === h.class_id)
    const statusColor = { ready:'#1D9E75', injured:'#E24B4A', cursed:'#666680', exhausted:'#BA7517', inspired:'#7F77DD' }[h.status] ?? '#888'
    return `<div class="card" style="margin:4px 6px 0">
      <div style="display:flex;justify-content:space-between;align-items:center">
        <span style="font-size:12px;font-weight:600">${h.name}</span>
        <span style="font-size:10px;color:${statusColor}">${h.status}</span>
      </div>
      <div style="font-size:10px;color:#666680">${cls?.label ?? '?'} · Lv.${h.level}</div>
      <div style="display:flex;gap:6px;margin-top:6px;flex-wrap:wrap">
        ${Object.entries(h.stats ?? {}).map(([k,v])=>`<span style="font-size:10px;color:#8888aa">${k.slice(0,3).toUpperCase()} <strong style="color:#c0c0d8">${Math.round(v)}</strong></span>`).join('')}
      </div>
    </div>`
  }).join('')
}

// ── Event log ─────────────────────────────────────────────────────────────────
function renderHeroesV2(s) {
  const el = document.getElementById('heroes-list')
  ensureHeroActionDelegation()

  if (!s.heroes.length) {
    el.innerHTML = '<div style="font-size:11px;color:#444460;padding:8px 6px">No heroes yet.</div>'
    return
  }

  if (!s.heroes.some((hero) => hero.id === heroUiState.expandedHeroId)) {
    heroUiState.expandedHeroId = s.heroes[0]?.id ?? null
    heroUiState.openSlotKey = null
    heroUiState.hoveredItemId = null
  }

  const heroMarkup = s.heroes.map((hero) => {
    const heroClass = getHeroClassForHero(s, hero)
    const heroStatuses = getHeroStatusList(hero)
    const primaryStatus = heroStatuses[0] ?? 'ready'
    const statusMeta = HERO_STATUS_META[primaryStatus] ?? HERO_STATUS_META.ready
    const xpNext = Math.max(1, hero.xp_next ?? 1)
    const xpPct = Math.max(0, Math.min(100, ((hero.xp ?? 0) / xpNext) * 100))
    const expanded = heroUiState.expandedHeroId === hero.id
    const equipmentSlots = EQUIPMENT_SLOTS.map((slotMeta) => {
      const equippedId = hero.equipment?.[slotMeta.slot]
      const equippedDef = equippedId ? getItemDefById(s, equippedId) : null
      const slotUsable = heroCanUseSlot(heroClass, slotMeta.slot)
      const slotKey = getSlotKey(hero.id, slotMeta.slot)
      const isOpen = heroUiState.openSlotKey === slotKey
      const rarity = equippedDef?.rarity ?? 'common'
      const rarityColor = RARITY_COLORS[rarity] ?? '#c0c0d8'
      const valueHtml = equippedDef
        ? `<span class="equipment-slot-value rarity-${rarity}" style="color:${rarityColor}">${equippedDef.icon ?? '📦'} ${equippedDef.label ?? equippedId}</span>`
        : `<span class="equipment-slot-empty">Empty</span>`

      if (!slotUsable) {
        return `<div class="equipment-row">
          <div class="equipment-row-head">
            <div class="equipment-slot-label">${slotMeta.icon} ${slotMeta.label}</div>
            <span class="equipment-slot-empty">Unavailable</span>
          </div>
          <div style="font-size:10px;color:#666680;margin-top:6px">This class cannot use this slot.</div>
        </div>`
      }

      if (equippedDef) {
        return `<div class="equipment-row">
          <button class="equipment-row-head hero-card-header" data-action="toggle-slot" data-hero-id="${hero.id}" data-slot="${slotMeta.slot}">
            <div class="equipment-slot-label">${slotMeta.icon} ${slotMeta.label}</div>
            ${valueHtml}
          </button>
          <div style="display:flex;justify-content:flex-end;margin-top:6px">
            <button class="equipment-mini-btn" title="Unequip" data-action="unequip-item" data-hero-id="${hero.id}" data-slot="${slotMeta.slot}">×</button>
          </div>
          ${isOpen ? renderEquipmentSelection(s, hero, slotMeta.slot) : ''}
        </div>`
      }

      return `<div class="equipment-row">
        <button class="equipment-row-head hero-card-header" data-action="toggle-slot" data-hero-id="${hero.id}" data-slot="${slotMeta.slot}">
          <div class="equipment-slot-label">${slotMeta.icon} ${slotMeta.label}</div>
          ${valueHtml}
        </button>
        ${isOpen ? renderEquipmentSelection(s, hero, slotMeta.slot) : ''}
      </div>`
    }).join('')

    return `<div class="card hero-card" data-hero-id="${hero.id}" style="margin:4px 6px 0">
      <button class="hero-card-header" data-action="toggle-hero" data-hero-id="${hero.id}">
        <div style="min-width:0;flex:1">
          <div class="hero-name" style="font-size:12px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${hero.name}</div>
          <div style="font-size:10px;color:#666680">${heroClass?.label ?? '?'} &middot; Lv.${hero.level}</div>
        </div>
        <div style="display:flex;align-items:center;gap:6px;flex-shrink:0">
          <span class="badge" style="background:${statusMeta.bg};color:${statusMeta.color};border:1px solid ${statusMeta.color}33">${statusMeta.icon} ${statusMeta.label}</span>
          <span style="font-size:12px;color:#666680">${expanded ? '▾' : '▸'}</span>
        </div>
      </button>
      <div style="display:flex;gap:4px;flex-wrap:wrap;margin-top:6px">${renderHeroStatusBadges(hero)}</div>
      <div style="margin-top:8px">
        <div class="progress-bar-outer" style="height:8px;margin-bottom:4px"><div class="progress-bar-inner" style="width:${xpPct}%;background:#7F77DD"></div></div>
        <div style="font-size:10px;color:#666680">XP ${s.fmt(hero.xp ?? 0)} / ${s.fmt(xpNext)}</div>
      </div>
      <div style="display:flex;gap:6px;margin-top:6px;flex-wrap:wrap">
        ${Object.entries(hero.stats ?? {}).map(([k, v]) => `<span style="font-size:10px;color:#8888aa">${k.slice(0, 3).toUpperCase()} <strong style="color:#c0c0d8">${Math.round(v)}</strong></span>`).join('')}
      </div>
      ${expanded ? `<div class="equipment-grid">${equipmentSlots}</div>` : ''}
    </div>`
  }).join('')

  el.innerHTML = heroMarkup
}

function renderEventLog(s) {
  const colors = { success:'#1D9E75', danger:'#E24B4A', system:'#7F77DD', info:'#666680' }
  const html = s.eventLog.map((e) =>
    `<div style="font-size:11px;color:${colors[e.type]??'#666680'};padding:3px 4px;border-bottom:1px solid #1e1e2e;line-height:1.4">${e.text}</div>`
  ).join('')
  document.getElementById('event-log').innerHTML = html || '<div style="font-size:11px;color:#444460;padding:4px">Nothing yet.</div>'
}

// ── Acts ──────────────────────────────────────────────────────────────────────
function renderInventoryPanel(s) {
  const el = document.getElementById('inventory-list')
  const items = (s.inventory ?? []).filter((entry) => entry.qty > 0)

  if (!items.length) {
    el.innerHTML = '<div style="font-size:11px;color:#444460;padding:4px 6px">Inventory empty.</div>'
    return
  }

  el.innerHTML = `<div style="display:flex;flex-wrap:wrap;gap:4px;padding:0 2px">
    ${items.map((entry) => {
      const def = entry.def ?? {}
      const isMaterial = def.subtype === 'material'
      const rarity = def.rarity ?? 'common'
      const rarityColor = RARITY_COLORS[rarity] ?? '#c0c0d8'
      const chipClass = isMaterial ? 'inventory-chip material' : `inventory-chip equipment rarity-${rarity}`
      const chipStyle = isMaterial
        ? ''
        : `color:${rarityColor};border-color:${rarityColor}55`
      return `<span class="${chipClass}" style="${chipStyle}">${def.icon ?? '📦'} ${def.label ?? entry.id} ×${entry.qty}</span>`
    }).join('')}
  </div>`
}

function renderActs(s) {
  const acts = s.acts ?? []
  const actMarkup = acts.length
    ? acts.map((act) => {
        const stateLabel = act.completed ? 'Completed' : act.visible ? 'Available' : 'Locked'
        const stateColor = act.completed ? '#1D9E75' : act.visible ? '#BA7517' : '#666680'
        const expeditionCount = (act.expedition_ids ?? []).length
        const contentLabel = `${expeditionCount} expedition${expeditionCount === 1 ? '' : 's'}${act.boss_expedition_id ? ' + boss' : ''}`
        return `<div style="padding:4px 6px;display:flex;align-items:flex-start;justify-content:space-between;gap:8px">
          <div style="min-width:0">
            <div style="font-size:10px;color:#444460;letter-spacing:0.08em;text-transform:uppercase">Act ${act.act_number ?? '?'}</div>
            <div style="font-size:11px;color:#c0c0d8;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${act.label}</div>
            <div style="font-size:10px;color:#666680">${contentLabel}</div>
          </div>
          <span style="font-size:10px;color:${stateColor};flex-shrink:0">${stateLabel}</span>
        </div>`
      }).join('')
    : '<div style="font-size:11px;color:#444460;padding:4px 6px">No acts defined.</div>'
  document.getElementById('acts-list').innerHTML = actMarkup
  return
  document.getElementById('acts-list').innerHTML = s.acts.length
    ? s.acts.map((a) => `<div style="padding:4px 6px;display:flex;align-items:center;gap:6px">
        <span style="font-size:12px">${a.completed ? '✅' : '⏳'}</span>
        <span style="font-size:11px;color:${a.completed?'#1D9E75':'#666680'}">${a.label}</span>
      </div>`).join('')
    : '<div style="font-size:11px;color:#444460;padding:4px 6px">No acts defined.</div>'
}

// ── Nav ───────────────────────────────────────────────────────────────────────
function renderNav(s) {
  ;['world','expedition','forge'].forEach((id) => {
    const btn = document.getElementById('nav-'+id)
    if (btn) btn.classList.toggle('active', s.ui.screen === id)
  })
  document.getElementById('screen-world').style.display = s.ui.screen==='world' ? 'block' : 'none'
  document.getElementById('screen-expedition').style.display = s.ui.screen==='expedition' ? 'block' : 'none'
  document.getElementById('screen-forge').style.display = s.ui.screen==='forge' ? 'block' : 'none'
}

// ── Notification ──────────────────────────────────────────────────────────────
function renderNotification(s) {
  const el = document.getElementById('notification')
  if (s.ui.notification) {
    const isDanger = s.ui.notification.type === 'danger'
    el.textContent = s.ui.notification.text
    el.style.background = isDanger ? '#E24B4A33' : '#1D9E7533'
    el.style.color = isDanger ? '#E24B4A' : '#1D9E75'
    el.style.border = `1px solid ${isDanger ? '#E24B4A66' : '#1D9E7566'}`
    el.classList.add('show')
  } else {
    el.classList.remove('show')
  }
}

// ── World screen ──────────────────────────────────────────────────────────────
function renderWorldScreen(s) {
  const el = document.getElementById('screen-world')
  ensureWorldActionDelegation()
  const worldHash = buildWorldRenderHash(s)
  if (renderCache.worldHash === worldHash) return
  renderCache.worldHash = worldHash

  const buildingsHtml = s.buildings.filter((b) => b.visible).map((b) => {
    const hasLevels = b.levels && b.levels.length > 0
    const levelData = hasLevels ? b.levels[b.level] : null
    const cost = levelData?.build_cost ?? []
    const canBuild = hasLevels && b.level < b.max_level && s.canAffordCost(cost)
    const atMax = b.level >= b.max_level
    const actionKey = getActionKey('build-building', b.id)
    const pending = pendingActions.has(actionKey)
    const costLabel = cost.length
      ? cost.map(c => s.fmt(c.amount) + ' ' + (s.resources.find(r=>r.id===c.resource_id)?.label ?? c.resource_id)).join(', ')
      : 'Free'
    return `<div class="card">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">
        <div>
          <span style="font-weight:600">${b.icon ?? '🏰'} ${b.label}</span>
          <span style="font-size:10px;color:#666680;margin-left:6px">Lv.${b.level}/${b.max_level}</span>
        </div>
        ${!hasLevels
          ? `<span style="font-size:10px;color:#444460;font-style:italic">not configured</span>`
          : atMax
            ? `<button class="btn btn-ghost" disabled>Max level</button>`
            : `<button class="btn ${canBuild && !pending ? 'btn-teal' : 'btn-ghost'}" ${canBuild && !pending ? '' : 'disabled'} data-action="build-building" data-building-id="${b.id}" data-action-key="${actionKey}">${pending ? 'Building...' : `Build · ${costLabel}`}</button>`
        }
      </div>
      ${b.level > 0 && hasLevels ? `<div style="display:flex;gap:8px;flex-wrap:wrap">
        ${Object.entries(b.levels[b.level-1]?.production??{}).map(([rid,rate])=>{
          const res = s.resources.find(r=>r.id===rid)
          return `<span style="font-size:10px;color:#5DCAA5">+${s.fmt(rate)}/s ${res?.label??rid}</span>`
        }).join('')}
        ${b.levels[b.level-1]?.hero_slots>0?`<span style="font-size:10px;color:#8888aa">🧑 ${b.levels[b.level-1].hero_slots} hero slots</span>`:''}
        ${b.is_crafting_station?`<span style="font-size:10px;color:#BA7517">🔨 forge</span>`:''}
      </div>` : ''}
    </div>`
  }).join('')

  const recruitHtml = s.heroClasses.map((cls) => {
    const cost = cls.recruit_cost ?? []
    const canRecruit = s.canAffordCost(cost)
    const actionKey = getActionKey('recruit-hero', cls.id)
    const pending = pendingActions.has(actionKey)
    return `<div class="card" style="display:flex;justify-content:space-between;align-items:center">
      <div>
        <div style="font-weight:600;font-size:12px">${cls.icon ?? '⚔️'} ${cls.label}</div>
        <div style="font-size:10px;color:#666680">${cost.map(c=>s.fmt(c.amount)+' '+(s.resources.find(r=>r.id===c.resource_id)?.label??c.resource_id)).join(', ')||'Free'}</div>
      </div>
      <button class="btn ${canRecruit && !pending ? 'btn-primary' : 'btn-ghost'}" ${canRecruit && !pending ? '' : 'disabled'} data-action="recruit-hero" data-class-id="${cls.id}" data-action-key="${actionKey}">${pending ? 'Recruiting...' : 'Recruit'}</button>
    </div>`
  }).join('')

  const upgradesHtml = s.upgrades.map((u) => {
    const cost = u.cost ?? []
    const canBuy = s.canAffordCost(cost) && u.tier < u.max_tier
    const actionKey = getActionKey('buy-upgrade', u.id)
    const pending = pendingActions.has(actionKey)
    return `<div class="card" style="display:flex;justify-content:space-between;align-items:center">
      <div>
        <div style="font-weight:600;font-size:12px">${u.icon??'⬆️'} ${u.label} ${u.max_tier>1?`(${u.tier}/${u.max_tier})`:''}</div>
        <div style="font-size:10px;color:#666680">${u.description||''}</div>
      </div>
      <button class="btn ${canBuy && !pending ? 'btn-primary' : 'btn-ghost'}" ${canBuy && !pending ? '' : 'disabled'} data-action="buy-upgrade" data-upgrade-id="${u.id}" data-action-key="${actionKey}">
        ${pending ? 'Buying...' : (u.tier>=u.max_tier?'✓ Max':cost.map(c=>s.fmt(c.amount)+' '+(s.resources.find(r=>r.id===c.resource_id)?.label??c.resource_id)).join(' + ')||'Buy')}
      </button>
    </div>`
  }).join('')

  const empty = !buildingsHtml && !recruitHtml && !upgradesHtml
  el.innerHTML = `<h2 style="font-size:15px;font-weight:700;margin-bottom:12px;color:#e0e0f0">World</h2>
    ${empty ? `<div style="color:#444460;font-size:12px;margin-top:24px;text-align:center"><div style="font-size:24px;margin-bottom:8px">🏚️</div>No visible content yet.<br><br>In the editor, make sure your nodes have no unlock_conditions so they appear immediately.</div>` : ''}
    ${buildingsHtml ? `<div style="font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:#444460;margin-bottom:8px">Buildings</div>${buildingsHtml}` : ''}
    ${recruitHtml ? `<div style="font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:#444460;margin:12px 0 8px">Recruit</div>${recruitHtml}` : ''}
    ${upgradesHtml ? `<div style="font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:#444460;margin:12px 0 8px">Upgrades</div>${upgradesHtml}` : ''}`
}

// ── Expedition screen ─────────────────────────────────────────────────────────
function renderExpeditionScreen(s) {
  const el = document.getElementById('screen-expedition')
  ensureExpeditionActionDelegation()
  syncExpeditionPartySelections(s)
  const expeditionHash = buildExpeditionRenderHash(s)
  if (renderCache.expeditionHash === expeditionHash) return
  renderCache.expeditionHash = expeditionHash
  const activeRun = s.activeRuns.find((r) => !r.done)
  const expeditionGroups = buildExpeditionGroups(s)

  const activeRunPanel = activeRun ? (() => {
    const exp = s.expeditions.find((e) => e.id === activeRun.expedition_id)
    const pct = Math.min(100, (activeRun.elapsed_s / activeRun.total_s) * 100)
    const bossHpPct = activeRun.boss_hp_max ? Math.round((activeRun.boss_hp / activeRun.boss_hp_max) * 100) : null
    const pendingBlock = activeRun.pending_event ? `<div style="background:#2a2a1e;border:1px solid #BA751766;border-radius:8px;padding:10px;margin-top:8px">
      <div style="font-size:12px;font-weight:600;color:#EF9F27;margin-bottom:8px">⚡ ${activeRun.pending_event.event_def.label}</div>
      <div style="display:flex;gap:6px;flex-wrap:wrap">
        ${(activeRun.pending_event.event_def.choices ?? []).map((choice, choiceIndex) => `<button class="btn btn-ghost" data-action="resolve-event-choice" data-run-id="${activeRun.run_id}" data-choice-index="${choiceIndex}">${choice.label}</button>`).join('')}
      </div></div>` : ''
    return `<div class="card" style="border-color:#7F77DD44;margin-bottom:16px">
      <div style="display:flex;justify-content:space-between;margin-bottom:8px">
        <span style="font-weight:700">${exp?.icon ?? '⚔️'} ${exp?.label ?? 'Expedition'}</span>
        <span style="font-size:11px;color:#666680">${Math.floor(activeRun.elapsed_s)}s / ${activeRun.total_s}s</span>
      </div>
      <div class="progress-bar-outer" style="margin-bottom:8px"><div class="progress-bar-inner" style="width:${pct}%;background:#7F77DD"></div></div>
      ${bossHpPct !== null ? `<div style="font-size:10px;color:#E24B4A;margin-bottom:4px">Boss HP</div><div class="progress-bar-outer" style="margin-bottom:8px"><div class="progress-bar-inner" style="width:${bossHpPct}%;background:#E24B4A"></div></div>` : ''}
      ${pendingBlock}
      <div style="max-height:140px;overflow-y:auto;margin-top:8px">
        ${activeRun.log.slice().reverse().map((entry) => `<div style="font-size:11px;color:#666680;padding:2px 0;border-bottom:1px solid #1e1e2e">${entry.text}</div>`).join('')}
      </div>
    </div>`
  })() : ''

  const actPanels = expeditionGroups.groupedActs.map((group, index) => {
    const { act, expeditions, bossExpedition } = group
    const stateLabel = act.completed ? 'Completed' : act.visible ? 'Available' : 'Locked'
    const stateColor = act.completed ? '#1D9E75' : act.visible ? '#BA7517' : '#666680'
    const previousAct = expeditionGroups.groupedActs[index - 1]?.act
    const lockedNote = index === 0
      ? 'Locked until the story opens.'
      : `Defeat ${previousAct?.label ?? 'the previous act'} boss first.`
    const innerMarkup = act.visible
      ? [
          ...expeditions.map((exp) => {
            const selectedParty = getExpeditionSelectedParty(s, exp)
            return renderExpeditionCard(s, exp, s.getExpeditionReadiness(exp.id, selectedParty))
          }),
          bossExpedition
            ? renderExpeditionCard(s, bossExpedition, s.getExpeditionReadiness(bossExpedition.id, getExpeditionSelectedParty(s, bossExpedition)), {
                boss: true,
                note: bossExpedition.visible ? '' : 'Complete all above first.',
              })
            : '',
        ].join('')
      : `<div style="font-size:11px;color:#666680">${lockedNote}</div>`
    const expeditionCount = expeditions.length
    const contentLabel = `${expeditionCount} expedition${expeditionCount === 1 ? '' : 's'}${bossExpedition ? ' + boss' : ''}`
    return `<section class="card" style="margin-bottom:12px;border-color:${stateColor}44">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:10px;margin-bottom:8px">
        <div>
          <div style="font-size:10px;letter-spacing:0.1em;text-transform:uppercase;color:#666680">Act ${act.act_number ?? index + 1}</div>
          <div style="font-size:14px;font-weight:700;color:#e0e0f0">${act.label}</div>
          <div style="font-size:10px;color:#666680">${contentLabel}</div>
        </div>
        <span class="badge" style="background:${stateColor}22;color:${stateColor};border:1px solid ${stateColor}44">${stateLabel}</span>
      </div>
      ${act.narrative_log ? `<div style="font-size:11px;color:#666680;margin-bottom:8px">${act.narrative_log}</div>` : ''}
      <div style="display:flex;flex-direction:column;gap:8px">${innerMarkup}</div>
    </section>`
  }).join('')

  const standalonePanel = expeditionGroups.standalone.length
    ? `<section class="card" style="margin-bottom:12px">
        <div style="font-size:10px;letter-spacing:0.1em;text-transform:uppercase;color:#666680;margin-bottom:8px">Standalone Expeditions</div>
        <div style="display:flex;flex-direction:column;gap:8px">
          ${expeditionGroups.standalone.map((exp) => renderExpeditionCard(s, exp, s.getExpeditionReadiness(exp.id, getExpeditionSelectedParty(s, exp)), {
            note: exp.visible ? '' : 'Unlock conditions not met.',
          })).join('')}
        </div>
      </section>`
    : ''

  el.innerHTML = `<h2 style="font-size:15px;font-weight:700;margin-bottom:12px">Expeditions</h2>
    ${activeRunPanel}
    ${actPanels}
    ${standalonePanel}
    ${!actPanels && !standalonePanel ? '<div style="color:#444460;font-size:12px">No expeditions available yet.</div>' : ''}`
  return

  const activeRunHtml = activeRun ? (() => {
    const exp = s.expeditions.find((e) => e.id === activeRun.expedition_id)
    const pct = Math.min(100, (activeRun.elapsed_s / activeRun.total_s) * 100)
    const bossHpPct = activeRun.boss_hp_max ? Math.round((activeRun.boss_hp / activeRun.boss_hp_max) * 100) : null
    const pendingHtml = activeRun.pending_event ? `<div style="background:#2a2a1e;border:1px solid #BA751766;border-radius:8px;padding:10px;margin-top:8px">
      <div style="font-size:12px;font-weight:600;color:#EF9F27;margin-bottom:8px">⚡ ${activeRun.pending_event.event_def.label}</div>
      <div style="display:flex;gap:6px;flex-wrap:wrap">
        ${(activeRun.pending_event.event_def.choices??[]).map((c,i)=>`<button class="btn btn-ghost" data-action="resolve-event-choice" data-run-id="${activeRun.run_id}" data-choice-index="${i}">${c.label}</button>`).join('')}
      </div></div>` : ''
    return `<div class="card" style="border-color:#7F77DD44;margin-bottom:16px">
      <div style="display:flex;justify-content:space-between;margin-bottom:8px">
        <span style="font-weight:700">${exp?.icon??'⚔️'} ${exp?.label??'Expedition'}</span>
        <span style="font-size:11px;color:#666680">${Math.floor(activeRun.elapsed_s)}s / ${activeRun.total_s}s</span>
      </div>
      <div class="progress-bar-outer" style="margin-bottom:8px"><div class="progress-bar-inner" style="width:${pct}%;background:#7F77DD"></div></div>
      ${bossHpPct!==null?`<div style="font-size:10px;color:#E24B4A;margin-bottom:4px">Boss HP</div><div class="progress-bar-outer" style="margin-bottom:8px"><div class="progress-bar-inner" style="width:${bossHpPct}%;background:#E24B4A"></div></div>`:''}
      ${pendingHtml}
      <div style="max-height:140px;overflow-y:auto;margin-top:8px">
        ${activeRun.log.slice().reverse().map((l)=>`<div style="font-size:11px;color:#666680;padding:2px 0;border-bottom:1px solid #1e1e2e">${l.text}</div>`).join('')}
      </div>
    </div>`
  })() : ''

  const expedHtml = s.expeditions.map((exp) => {
    const onRun = s.activeRuns.some((r) => !r.done)
    const readyHeroes = s.heroes.filter((h) => h.status === 'ready')
    const canSend = !onRun && readyHeroes.length > 0
    const actionKey = getActionKey('start-expedition', exp.id)
    const pending = pendingActions.has(actionKey)
    return `<div class="card">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">
        <div>
          <span style="font-weight:600">${exp.icon??'🗺️'} ${exp.label}</span>
          ${exp.type==='boss_expedition'?'<span class="badge" style="background:#E24B4A22;color:#E24B4A;border:1px solid #E24B4A44;margin-left:6px">BOSS</span>':''}
        </div>
        <span style="font-size:11px;color:#666680">Lv.${exp.level ?? 1} · ${exp.duration_s}s</span>
      </div>
      <div style="font-size:11px;color:#666680;margin-bottom:8px">${exp.description||''}</div>
      <button class="btn ${canSend && !pending ? 'btn-primary' : 'btn-ghost'}" ${canSend && !pending ? '' : 'disabled'} data-action="start-expedition" data-expedition-id="${exp.id}" data-party-size="${exp.party_size}" data-action-key="${actionKey}">
        ${pending ? 'Sending...' : (onRun?'Run in progress':readyHeroes.length===0?'No heroes ready':`Send ${exp.party_size} heroes`)}
      </button>
    </div>`
  }).join('')

  el.innerHTML = `<h2 style="font-size:15px;font-weight:700;margin-bottom:12px">Expeditions</h2>
    ${activeRunHtml}
    ${expedHtml || '<div style="color:#444460;font-size:12px">No expeditions available yet.</div>'}`
}

// ── Forge screen ──────────────────────────────────────────────────────────────
function ensureWorldActionDelegation() {
  if (worldActionsBound) return
  const el = document.getElementById('screen-world')
  if (!el) return
  el.addEventListener('click', handleWorldActionClick)
  worldActionsBound = true
}

function ensureExpeditionActionDelegation() {
  if (expeditionActionsBound) return
  const el = document.getElementById('screen-expedition')
  if (!el) return
  el.addEventListener('click', handleExpeditionActionClick)
  expeditionActionsBound = true
}

function handleWorldActionClick(e) {
  const btn = e.target.closest('button[data-action]')
  if (!btn || btn.disabled || !e.currentTarget.contains(btn)) return

  const action = btn.dataset.action
  if (action === 'build-building') {
    queueAction(btn.dataset.actionKey || getActionKey(action, btn.dataset.buildingId), () => actions.buildBuilding(btn.dataset.buildingId))
  } else if (action === 'recruit-hero') {
    queueAction(btn.dataset.actionKey || getActionKey(action, btn.dataset.classId), () => actions.recruitHero(btn.dataset.classId))
  } else if (action === 'buy-upgrade') {
    queueAction(btn.dataset.actionKey || getActionKey(action, btn.dataset.upgradeId), () => actions.buyUpgrade(btn.dataset.upgradeId))
  }
}

function handleExpeditionActionClick(e) {
  const btn = e.target.closest('button[data-action]')
  if (!btn || btn.disabled || !e.currentTarget.contains(btn)) return

  const action = btn.dataset.action
  if (action === 'start-expedition') {
    const expeditionId = btn.dataset.expeditionId
    const exp = snapshot?.expeditions?.find((entry) => entry.id === expeditionId)
    const selectedParty = exp ? getExpeditionSelectedParty(snapshot, exp) : []
    queueAction(btn.dataset.actionKey || getActionKey(action, expeditionId), () => actions.startExpedition(expeditionId, selectedParty))
    return
  }
  if (action === 'resolve-event-choice') {
    actions.resolveEventChoice(btn.dataset.runId, Number(btn.dataset.choiceIndex))
  } else if (action === 'toggle-expedition-party') {
    const expeditionId = btn.dataset.expeditionId
    const heroId = btn.dataset.heroId
    const exp = snapshot?.expeditions?.find((entry) => entry.id === expeditionId)
    if (!exp || !snapshot) return
    const result = toggleExpeditionPartyMember(snapshot, exp, heroId)
    if (!result.ok) notify(result.reason, 'danger')
    if (snapshot) render(snapshot)
  } else if (action === 'remove-expedition-party') {
    const expeditionId = btn.dataset.expeditionId
    const heroId = btn.dataset.heroId
    const exp = snapshot?.expeditions?.find((entry) => entry.id === expeditionId)
    if (!exp || !snapshot) return
    const next = getExpeditionSelectedParty(snapshot, exp).filter((id) => id !== heroId)
    setExpeditionSelectedParty(expeditionId, next)
    if (snapshot) render(snapshot)
  } else if (action === 'auto-fill-expedition-party') {
    const expeditionId = btn.dataset.expeditionId
    const exp = snapshot?.expeditions?.find((entry) => entry.id === expeditionId)
    if (!exp || !snapshot) return
    autoFillExpeditionParty(snapshot, exp)
    if (snapshot) render(snapshot)
  } else if (action === 'clear-expedition-party') {
    clearExpeditionParty(btn.dataset.expeditionId)
    if (snapshot) render(snapshot)
  }
}

function ensureHeroActionDelegation() {
  if (heroActionsBound) return
  const el = document.getElementById('right-panel')
  if (!el) return
  el.addEventListener('click', handleHeroActionClick)
  el.addEventListener('mouseover', handleHeroActionHover)
  el.addEventListener('mouseout', handleHeroActionHover)
  heroActionsBound = true
}

function handleHeroActionClick(e) {
  const btn = e.target.closest('button[data-action]')
  if (!btn || btn.disabled || !e.currentTarget.contains(btn)) return

  const action = btn.dataset.action
  if (action === 'toggle-hero') {
    const heroId = btn.dataset.heroId
    if (heroUiState.expandedHeroId === heroId) {
      heroUiState.expandedHeroId = null
      heroUiState.openSlotKey = null
      heroUiState.hoveredItemId = null
    } else {
      heroUiState.expandedHeroId = heroId
      heroUiState.openSlotKey = null
      heroUiState.hoveredItemId = null
    }
    if (snapshot) render(snapshot)
    return
  }

  if (action === 'toggle-slot') {
    const heroId = btn.dataset.heroId
    const slot = btn.dataset.slot
    heroUiState.expandedHeroId = heroId
    const slotKey = getSlotKey(heroId, slot)
    if (heroUiState.openSlotKey === slotKey) {
      heroUiState.openSlotKey = null
      heroUiState.hoveredItemId = null
    } else {
      heroUiState.openSlotKey = slotKey
      heroUiState.hoveredItemId = null
    }
    if (snapshot) render(snapshot)
    return
  }

  if (action === 'equip-item') {
    const heroId = btn.dataset.heroId
    const itemId = btn.dataset.itemId
    const result = actions.equipItem(heroId, itemId)
    if (result?.ok) {
      heroUiState.openSlotKey = null
      heroUiState.hoveredItemId = null
    }
    if (snapshot) render(snapshot)
    return
  }

  if (action === 'unequip-item') {
    const heroId = btn.dataset.heroId
    const slot = btn.dataset.slot
    const result = actions.unequipItem(heroId, slot)
    if (result?.ok) {
      heroUiState.openSlotKey = null
      heroUiState.hoveredItemId = null
    }
    if (snapshot) render(snapshot)
    return
  }
}

function handleHeroActionHover(e) {
  const itemBtn = e.target.closest('button[data-item-id]')
  if (!itemBtn || !e.currentTarget.contains(itemBtn)) {
    return
  }

  const itemId = itemBtn.dataset.itemId
  if (e.type === 'mouseover') {
    if (heroUiState.hoveredItemId !== itemId) {
      heroUiState.hoveredItemId = itemId
      if (snapshot) render(snapshot)
    }
    return
  }

  if (e.type === 'mouseout') {
    const related = e.relatedTarget
    if (related && itemBtn.contains(related)) return
    if (heroUiState.hoveredItemId === itemId) {
      heroUiState.hoveredItemId = null
      if (snapshot) render(snapshot)
    }
  }
}

function queueAction(actionKey, runAction) {
  if (!actionKey || pendingActions.has(actionKey)) return
  pendingActions.add(actionKey)
  if (snapshot) render(snapshot)

  const timer = setTimeout(() => {
    pendingActionTimers.delete(actionKey)
    try {
      runAction()
    } finally {
      pendingActions.delete(actionKey)
    }
  }, ACTION_DELAY_MS)

  pendingActionTimers.set(actionKey, timer)
}

function getActionKey(action, targetId) {
  return `${action}:${targetId}`
}

function buildWorldRenderHash(s) {
  return JSON.stringify({
    resources: s.resources.map((r) => ({ id: r.id, icon: r.icon, amount: r.amount, cap: r.cap, income: r.effective_income ?? r.income })),
    buildings: s.buildings.map((b) => ({
      id: b.id,
      icon: b.icon,
      visible: b.visible,
      level: b.level,
      max_level: b.max_level,
      is_crafting_station: b.is_crafting_station,
      levels: (b.levels ?? []).map((lvl) => ({
        build_cost: lvl.build_cost ?? [],
        build_time_s: lvl.build_time_s ?? 0,
        hero_slots: lvl.hero_slots ?? 0,
        recipe_slots: lvl.recipe_slots ?? 0,
        production: lvl.production ?? {},
      })),
    })),
    heroClasses: s.heroClasses.map((cls) => ({ id: cls.id, icon: cls.icon, recruit_cost: cls.recruit_cost ?? [] })),
    upgrades: s.upgrades.map((u) => ({ id: u.id, icon: u.icon, tier: u.tier, max_tier: u.max_tier, cost: u.cost ?? [] })),
    pending: [...pendingActions].filter((key) =>
      key.startsWith('build-building:') || key.startsWith('recruit-hero:') || key.startsWith('buy-upgrade:')
    ),
  })
}

function buildExpeditionRenderHash(s) {
  const actSnapshots = (s.acts ?? []).map((act) => ({
    id: act.id,
    label: act.label,
    act_number: act.act_number,
    visible: act.visible,
    completed: act.completed,
    expedition_ids: act.expedition_ids ?? [],
    boss_expedition_id: act.boss_expedition_id ?? '',
    narrative_log: act.narrative_log ?? '',
  }))
  const expeditionSnapshots = (s.expeditions ?? []).map((exp) => ({
    id: exp.id,
    type: exp.type,
    label: exp.label,
    icon: exp.icon,
    level: exp.level,
    party_size: exp.party_size,
    duration_s: exp.duration_s,
    enemy_atk: exp.enemy_atk,
    enemy_hp: exp.enemy_hp,
    boss_hp: exp.boss_hp ?? null,
    visible: exp.visible,
    completed: exp.completed ?? false,
    best_tier: exp.best_tier ?? null,
    curse_chance: exp.curse_chance ?? 0,
  }))
  const heroSnapshots = (s.heroes ?? []).map((hero) => ({
    id: hero.id,
    status: hero.status,
    statuses: hero.statuses ?? [],
    level: hero.level,
    xp: hero.xp ?? 0,
    xp_next: hero.xp_next ?? 0,
    stats: hero.stats ?? {},
  }))
  const renderHash = JSON.stringify({
    acts: actSnapshots,
    expeditions: expeditionSnapshots,
    activeRuns: (s.activeRuns ?? []).map((run) => ({
      run_id: run.run_id,
      expedition_id: run.expedition_id,
      elapsed_s: Math.floor(run.elapsed_s * 4),
      total_s: Math.floor(run.total_s * 4),
      done: run.done,
      pending_event: run.pending_event?.event_def?.label ?? null,
      log_len: run.log.length,
      boss_hp: run.boss_hp ?? null,
    })),
    heroes: heroSnapshots,
    multipliers: s.multipliers?.hero_stats ?? {},
    selectedParties: expeditionUiState.selectedPartyByExpedition,
    pending: [...pendingActions].filter((key) => key.startsWith('start-expedition:')),
  })
  return renderHash
  return JSON.stringify({
    expeditions: s.expeditions.map((exp) => ({
      id: exp.id,
      icon: exp.icon,
      party_size: exp.party_size,
      duration_s: exp.duration_s,
      visible: exp.visible,
      level: exp.level,
    })),
    activeRuns: s.activeRuns.map((r) => ({
      run_id: r.run_id,
      expedition_id: r.expedition_id,
      elapsed_s: Math.floor(r.elapsed_s * 4),
      total_s: Math.floor(r.total_s * 4),
      done: r.done,
      pending_event: r.pending_event?.event_def?.label ?? null,
      log_len: r.log.length,
      boss_hp: r.boss_hp ?? null,
    })),
    heroes: s.heroes.map((h) => ({ id: h.id, status: h.status })),
    pending: [...pendingActions].filter((key) => key.startsWith('start-expedition:')),
  })
}

function renderForgeScreen(s) {
  const el = document.getElementById('screen-forge')
  const stations = s.buildings.filter((b) => b.is_crafting_station && b.level > 0)
  const invHtml = s.inventory.length
    ? s.inventory.map((i) => `<span class="badge rarity-${i.def?.rarity??'common'}" style="background:#1e1e2e;border:1px solid #2a2a3e;margin:2px">${i.def?.icon??'📦'} ${i.def?.label??i.id} ×${i.qty}</span>`).join('')
    : '<span style="color:#444460;font-size:11px">Empty</span>'
  const stationsHtml = stations.map((bld) => {
    const levelData = bld.levels[bld.level-1]
    const slots = levelData?.recipe_slots ?? 1
    return `<div class="card">
      <div style="font-weight:600;margin-bottom:6px">${bld.icon??'🔨'} ${bld.label} <span style="font-size:10px;color:#666680">${bld.craft_queue.length}/${slots} slots</span></div>
      ${bld.craft_queue.map((job)=>{
        const pct = Math.min(100,(job.progress_s/job.total_s)*100)
        return `<div style="margin-bottom:6px"><div style="font-size:11px;color:#8888aa;margin-bottom:3px">${job.recipe_id}</div><div class="progress-bar-outer"><div class="progress-bar-inner" style="width:${pct}%;background:#BA7517"></div></div></div>`
      }).join('') || '<div style="font-size:11px;color:#444460">Queue empty</div>'}
    </div>`
  }).join('')
  el.innerHTML = `<h2 style="font-size:15px;font-weight:700;margin-bottom:12px">Forge</h2>
    <div style="font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:#444460;margin-bottom:8px">Inventory</div>
    <div style="margin-bottom:16px;display:flex;flex-wrap:wrap;gap:4px">${invHtml}</div>
    ${stations.length ? `<div style="font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:#444460;margin-bottom:8px">Crafting stations</div>${stationsHtml}` : '<div style="color:#444460;font-size:12px">No crafting stations built yet.</div>'}`
}

function renderForgeScreenV2(s) {
  const el = document.getElementById('screen-forge')
  const stations = s.buildings.filter((b) => b.is_crafting_station && b.level > 0)
  const stationsHtml = stations.map((bld) => {
    const levelData = bld.levels[bld.level - 1]
    const slots = levelData?.recipe_slots ?? 1
    return `<div class="card">
      <div style="font-weight:600;margin-bottom:6px">${bld.icon ?? '🔨'} ${bld.label} <span style="font-size:10px;color:#666680">${bld.craft_queue.length}/${slots} slots</span></div>
      ${bld.craft_queue.map((job) => {
        const pct = Math.min(100, (job.progress_s / job.total_s) * 100)
        return `<div style="margin-bottom:6px"><div style="font-size:11px;color:#8888aa;margin-bottom:3px">${job.recipe_id}</div><div class="progress-bar-outer"><div class="progress-bar-inner" style="width:${pct}%;background:#BA7517"></div></div></div>`
      }).join('') || '<div style="font-size:11px;color:#444460">Queue empty</div>'}
    </div>`
  }).join('')

  el.innerHTML = `<h2 style="font-size:15px;font-weight:700;margin-bottom:12px">Forge</h2>
    ${stations.length ? `<div style="font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:#444460;margin-bottom:8px">Crafting stations</div>${stationsHtml}` : '<div style="color:#444460;font-size:12px">No crafting stations built yet.</div>'}`
}

function showRestartConfirm() {
  if (!currentProject) return
  restartConfirmOpen = true
  const modal = document.getElementById('restart-modal')
  modal.style.display = 'flex'
}

function hideRestartConfirm() {
  restartConfirmOpen = false
  const modal = document.getElementById('restart-modal')
  modal.style.display = 'none'
}

function restartCurrentGame() {
  if (!currentProject) return
  hideRestartConfirm()
  localStorage.removeItem('guild-engine-save')
  startGame(currentProject)
}
</script>
