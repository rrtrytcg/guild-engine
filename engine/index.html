<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Guild Engine</title>
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%;background:#0d0d1a;color:#e0e0f0;font-family:system-ui,-apple-system,sans-serif;font-size:14px;overflow:hidden}
  ::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:#2a2a3e;border-radius:4px}

  /* ── Layout ── */
  #app{display:flex;flex-direction:column;height:100vh}
  #topbar{height:48px;background:#0a0a14;border-bottom:1px solid #2a2a3e;display:flex;align-items:center;padding:0 16px;gap:12px;flex-shrink:0}
  #main{display:flex;flex:1;overflow:hidden}
  #left-panel{width:220px;flex-shrink:0;background:#13131f;border-right:1px solid #2a2a3e;display:flex;flex-direction:column;overflow-y:auto}
  #center{flex:1;overflow-y:auto;padding:16px}
  #right-panel{width:260px;flex-shrink:0;background:#13131f;border-left:1px solid #2a2a3e;display:flex;flex-direction:column;overflow-y:auto}

  /* ── Reusable ── */
  .section-label{font-size:9px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:#444460;padding:10px 14px 4px}
  .card{background:#1e1e2e;border:1px solid #2a2a3e;border-radius:10px;padding:12px;margin-bottom:8px}
  .badge{display:inline-flex;align-items:center;padding:2px 7px;border-radius:4px;font-size:10px;font-weight:600}
  .btn{border:none;border-radius:7px;font-size:11px;font-weight:600;padding:5px 12px;cursor:pointer;transition:opacity .1s}
  .btn:disabled{opacity:.35;cursor:not-allowed}
  .btn-primary{background:#7F77DD;color:#fff}
  .btn-primary:hover:not(:disabled){background:#534AB7}
  .btn-teal{background:#1D9E75;color:#fff}
  .btn-teal:hover:not(:disabled){background:#0F6E56}
  .btn-ghost{background:transparent;border:1px solid #2a2a3e;color:#8888aa}
  .btn-ghost:hover{border-color:#444460;color:#c0c0d8}
  .progress-bar-outer{background:#1a1a2e;border-radius:4px;height:6px;overflow:hidden}
  .progress-bar-inner{height:100%;border-radius:4px;transition:width .25s linear}
  .nav-btn{background:transparent;border:none;padding:6px 10px;border-radius:6px;color:#666680;font-size:12px;font-weight:500;cursor:pointer;display:flex;align-items:center;gap:6px}
  .nav-btn.active,.nav-btn:hover{background:#1e1e2e;color:#e0e0f0}
  .rarity-common{color:#B4B2A9} .rarity-uncommon{color:#5DCAA5} .rarity-rare{color:#378ADD} .rarity-epic{color:#7F77DD} .rarity-legendary{color:#EF9F27}
  #notification{position:fixed;top:56px;left:50%;transform:translateX(-50%);z-index:999;padding:8px 18px;border-radius:8px;font-size:12px;font-weight:600;pointer-events:none;opacity:0;transition:opacity .2s}
  #notification.show{opacity:1}
</style>
</head>
<body>
<div id="app">

  <!-- Top bar -->
  <div id="topbar">
    <span id="game-title" style="font-size:13px;font-weight:700;color:#e0e0f0">Guild Engine</span>
    <span style="font-size:9px;font-weight:700;background:#7F77DD22;color:#7F77DD;border:1px solid #7F77DD44;border-radius:4px;padding:1px 5px;letter-spacing:.1em">RUNTIME</span>
    <div style="flex:1"></div>
    <button class="btn btn-ghost" id="btn-save" onclick="actions.saveGame()">Save</button>
    <button class="btn btn-ghost" id="btn-back" onclick="goToEditor()" style="font-size:11px">← Editor</button>
  </div>

  <!-- Main layout -->
  <div id="main">

    <!-- Left: resources + nav -->
    <div id="left-panel">
      <div class="section-label">Resources</div>
      <div id="resources-list" style="padding:0 8px 8px"></div>
      <div style="border-top:1px solid #2a2a3e;margin-top:4px;padding:8px">
        <div class="section-label" style="padding:4px 6px">View</div>
        <button class="nav-btn active" id="nav-world" onclick="setScreen('world')">🌍 World</button>
        <button class="nav-btn" id="nav-expedition" onclick="setScreen('expedition')">⚔️ Expedition</button>
        <button class="nav-btn" id="nav-forge" onclick="setScreen('forge')">🔨 Forge</button>
      </div>
      <div style="padding:8px">
        <div class="section-label" style="padding:4px 6px">Acts</div>
        <div id="acts-list"></div>
      </div>
    </div>

    <!-- Center: screen content -->
    <div id="center">
      <div id="screen-world"></div>
      <div id="screen-expedition" style="display:none"></div>
      <div id="screen-forge" style="display:none"></div>
    </div>

    <!-- Right: heroes + event log -->
    <div id="right-panel">
      <div class="section-label">Heroes</div>
      <div id="heroes-list" style="padding:0 8px 8px"></div>
      <div style="border-top:1px solid #2a2a3e;padding:8px">
        <div class="section-label" style="padding:4px 6px">Event log</div>
        <div id="event-log" style="padding:0 2px"></div>
      </div>
    </div>
  </div>
</div>

<div id="notification"></div>

<!-- No-project warning (hidden until needed) -->
<div id="no-project" style="display:none;position:fixed;inset:0;background:#0d0d1a;align-items:center;justify-content:center;flex-direction:column;gap:16px">
  <div style="font-size:32px">⚔️</div>
  <div style="font-size:18px;font-weight:700;color:#e0e0f0">No project loaded</div>
  <div style="font-size:13px;color:#666680;text-align:center;max-width:360px">Drop a <code>project.json</code> exported from the Guild Engine editor onto this page, or click below.</div>
  <label style="cursor:pointer">
    <input type="file" accept=".json" id="file-picker" style="display:none"/>
    <span class="btn btn-primary" style="font-size:13px;padding:10px 24px">Load project.json</span>
  </label>
</div>

<script type="module">
import { initEngine, actions as engineActions } from './engine.js'
import { MIN_ACTION_DELAY_MS } from './systems/buildings.js'
window.actions = engineActions
const actions = engineActions
let snapshot = null
const pendingActions = new Set()
const pendingActionTimers = new Map()
const ACTION_DELAY_MS = MIN_ACTION_DELAY_MS
const renderCache = {
  worldHash: null,
  expeditionHash: null,
}
let worldActionsBound = false
let expeditionActionsBound = false

// ── Load screen shown immediately ─────────────────────────────────────────────
const noProject = document.getElementById('no-project')
noProject.style.cssText = 'display:flex;position:fixed;inset:0;background:#0d0d1a;align-items:center;justify-content:center;flex-direction:column;gap:16px;z-index:100'

function loadFile(file) {
  if (!file) return
  const reader = new FileReader()
  reader.onload = (ev) => {
    try { startGame(JSON.parse(ev.target.result)) }
    catch (err) { alert('Could not parse project.json: ' + err.message) }
  }
  reader.readAsText(file)
}

document.getElementById('file-picker').addEventListener('change', (e) => loadFile(e.target.files?.[0]))
document.addEventListener('dragover', (e) => e.preventDefault())
document.addEventListener('drop', (e) => { e.preventDefault(); loadFile(e.dataTransfer.files?.[0]) })

function startGame(project) {
  noProject.style.display = 'none'
  document.getElementById('app').style.display = 'flex'
  document.getElementById('game-title').textContent = project.meta?.title ?? 'Guild Engine'
  document.title = project.meta?.title ?? 'Guild Engine'
  pendingActions.clear()
  for (const timer of pendingActionTimers.values()) clearTimeout(timer)
  pendingActionTimers.clear()
  renderCache.worldHash = null
  renderCache.expeditionHash = null
  snapshot = initEngine(project, (snap) => { snapshot = snap; render(snap) })
  render(snapshot)
}

window.goToEditor = () => window.history.back()
window.setScreen = (s) => { engineActions.setScreen(s); if (snapshot) render(snapshot) }
window.sendParty = (expedId, partySize) => {
  if (!snapshot) return
  const maxPartySize = Number(partySize) || snapshot.expeditions.find((e) => e.id === expedId)?.party_size || snapshot.heroes.length
  const readyHeroes = snapshot.heroes
    .filter((h) => h.status === 'ready')
    .map((h) => h.id)
    .slice(0, maxPartySize)
  actions.startExpedition(expedId, readyHeroes)
}

// ── Master render ─────────────────────────────────────────────────────────────
function render(s) {
  renderResources(s)
  renderHeroes(s)
  renderEventLog(s)
  renderActs(s)
  renderNav(s)
  renderNotification(s)
  if (s.ui.screen === 'world') renderWorldScreen(s)
  if (s.ui.screen === 'expedition') renderExpeditionScreen(s)
  if (s.ui.screen === 'forge') renderForgeScreen(s)
}

// ── Resources (left panel) ────────────────────────────────────────────────────
function renderResources(s) {
  const el = document.getElementById('resources-list')
  const visible = s.resources.filter((r) => !r.is_material)
  if (!visible.length) { el.innerHTML = '<div style="font-size:11px;color:#444460;padding:8px 6px">No resources defined.</div>'; return }
  el.innerHTML = visible.map((r) => {
    const pct = r.cap > 0 ? Math.min(100, (r.amount / r.cap) * 100) : 0
    return `<div style="padding:8px 6px;cursor:pointer" onclick="actions.clickResource('${r.id}')">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px">
        <span style="font-size:12px;color:#c0c0d8">${r.icon ?? '💰'} ${r.label}</span>
        <span style="font-size:11px;color:#8888aa">${s.fmt(r.amount)}${r.cap > 0 ? '/' + s.fmt(r.cap) : ''}</span>
      </div>
      ${r.cap > 0 ? `<div class="progress-bar-outer"><div class="progress-bar-inner" style="width:${pct}%;background:#7F77DD"></div></div>` : ''}
      ${(r.effective_income ?? r.income) > 0 ? `<div style="font-size:10px;color:#444460;margin-top:2px">+${s.fmt(r.effective_income ?? r.income)}/s</div>` : ''}
    </div>`
  }).join('')
}

// ── Heroes (right panel) ──────────────────────────────────────────────────────
function renderHeroes(s) {
  const el = document.getElementById('heroes-list')
  if (!s.heroes.length) { el.innerHTML = '<div style="font-size:11px;color:#444460;padding:8px 6px">No heroes yet.</div>'; return }
  el.innerHTML = s.heroes.map((h) => {
    const cls = s.heroClasses.find((c) => c.id === h.class_id)
    const statusColor = { ready:'#1D9E75', on_expedition:'#BA7517', injured:'#E24B4A' }[h.status] ?? '#888'
    return `<div class="card" style="margin:4px 6px 0">
      <div style="display:flex;justify-content:space-between;align-items:center">
        <span style="font-size:12px;font-weight:600">${h.name}</span>
        <span style="font-size:10px;color:${statusColor}">${h.status}</span>
      </div>
      <div style="font-size:10px;color:#666680">${cls?.label ?? '?'} · Lv.${h.level}</div>
      <div style="display:flex;gap:6px;margin-top:6px;flex-wrap:wrap">
        ${Object.entries(h.stats ?? {}).map(([k,v])=>`<span style="font-size:10px;color:#8888aa">${k.slice(0,3).toUpperCase()} <strong style="color:#c0c0d8">${Math.round(v)}</strong></span>`).join('')}
      </div>
    </div>`
  }).join('')
}

// ── Event log ─────────────────────────────────────────────────────────────────
function renderEventLog(s) {
  const colors = { success:'#1D9E75', danger:'#E24B4A', system:'#7F77DD', info:'#666680' }
  const html = s.eventLog.map((e) =>
    `<div style="font-size:11px;color:${colors[e.type]??'#666680'};padding:3px 4px;border-bottom:1px solid #1e1e2e;line-height:1.4">${e.text}</div>`
  ).join('')
  document.getElementById('event-log').innerHTML = html || '<div style="font-size:11px;color:#444460;padding:4px">Nothing yet.</div>'
}

// ── Acts ──────────────────────────────────────────────────────────────────────
function renderActs(s) {
  document.getElementById('acts-list').innerHTML = s.acts.length
    ? s.acts.map((a) => `<div style="padding:4px 6px;display:flex;align-items:center;gap:6px">
        <span style="font-size:12px">${a.completed ? '✅' : '⏳'}</span>
        <span style="font-size:11px;color:${a.completed?'#1D9E75':'#666680'}">${a.label}</span>
      </div>`).join('')
    : '<div style="font-size:11px;color:#444460;padding:4px 6px">No acts defined.</div>'
}

// ── Nav ───────────────────────────────────────────────────────────────────────
function renderNav(s) {
  ;['world','expedition','forge'].forEach((id) => {
    const btn = document.getElementById('nav-'+id)
    if (btn) btn.classList.toggle('active', s.ui.screen === id)
  })
  document.getElementById('screen-world').style.display = s.ui.screen==='world' ? 'block' : 'none'
  document.getElementById('screen-expedition').style.display = s.ui.screen==='expedition' ? 'block' : 'none'
  document.getElementById('screen-forge').style.display = s.ui.screen==='forge' ? 'block' : 'none'
}

// ── Notification ──────────────────────────────────────────────────────────────
function renderNotification(s) {
  const el = document.getElementById('notification')
  if (s.ui.notification) {
    const isDanger = s.ui.notification.type === 'danger'
    el.textContent = s.ui.notification.text
    el.style.background = isDanger ? '#E24B4A33' : '#1D9E7533'
    el.style.color = isDanger ? '#E24B4A' : '#1D9E75'
    el.style.border = `1px solid ${isDanger ? '#E24B4A66' : '#1D9E7566'}`
    el.classList.add('show')
  } else {
    el.classList.remove('show')
  }
}

// ── World screen ──────────────────────────────────────────────────────────────
function renderWorldScreen(s) {
  const el = document.getElementById('screen-world')
  ensureWorldActionDelegation()
  const worldHash = buildWorldRenderHash(s)
  if (renderCache.worldHash === worldHash) return
  renderCache.worldHash = worldHash

  const buildingsHtml = s.buildings.filter((b) => b.visible).map((b) => {
    const hasLevels = b.levels && b.levels.length > 0
    const levelData = hasLevels ? b.levels[b.level] : null
    const cost = levelData?.build_cost ?? []
    const canBuild = hasLevels && b.level < b.max_level && s.canAffordCost(cost)
    const atMax = b.level >= b.max_level
    const actionKey = getActionKey('build-building', b.id)
    const pending = pendingActions.has(actionKey)
    const costLabel = cost.length
      ? cost.map(c => s.fmt(c.amount) + ' ' + (s.resources.find(r=>r.id===c.resource_id)?.label ?? c.resource_id)).join(', ')
      : 'Free'
    return `<div class="card">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">
        <div>
          <span style="font-weight:600">${b.icon ?? '🏰'} ${b.label}</span>
          <span style="font-size:10px;color:#666680;margin-left:6px">Lv.${b.level}/${b.max_level}</span>
        </div>
        ${!hasLevels
          ? `<span style="font-size:10px;color:#444460;font-style:italic">not configured</span>`
          : atMax
            ? `<button class="btn btn-ghost" disabled>Max level</button>`
            : `<button class="btn ${canBuild && !pending ? 'btn-teal' : 'btn-ghost'}" ${canBuild && !pending ? '' : 'disabled'} data-action="build-building" data-building-id="${b.id}" data-action-key="${actionKey}">${pending ? 'Building...' : `Build · ${costLabel}`}</button>`
        }
      </div>
      ${b.level > 0 && hasLevels ? `<div style="display:flex;gap:8px;flex-wrap:wrap">
        ${Object.entries(b.levels[b.level-1]?.production??{}).map(([rid,rate])=>{
          const res = s.resources.find(r=>r.id===rid)
          return `<span style="font-size:10px;color:#5DCAA5">+${s.fmt(rate)}/s ${res?.label??rid}</span>`
        }).join('')}
        ${b.levels[b.level-1]?.hero_slots>0?`<span style="font-size:10px;color:#8888aa">🧑 ${b.levels[b.level-1].hero_slots} hero slots</span>`:''}
        ${b.is_crafting_station?`<span style="font-size:10px;color:#BA7517">🔨 forge</span>`:''}
      </div>` : ''}
    </div>`
  }).join('')

  const recruitHtml = s.heroClasses.map((cls) => {
    const cost = cls.recruit_cost ?? []
    const canRecruit = s.canAffordCost(cost)
    const actionKey = getActionKey('recruit-hero', cls.id)
    const pending = pendingActions.has(actionKey)
    return `<div class="card" style="display:flex;justify-content:space-between;align-items:center">
      <div>
        <div style="font-weight:600;font-size:12px">${cls.icon ?? '⚔️'} ${cls.label}</div>
        <div style="font-size:10px;color:#666680">${cost.map(c=>s.fmt(c.amount)+' '+(s.resources.find(r=>r.id===c.resource_id)?.label??c.resource_id)).join(', ')||'Free'}</div>
      </div>
      <button class="btn ${canRecruit && !pending ? 'btn-primary' : 'btn-ghost'}" ${canRecruit && !pending ? '' : 'disabled'} data-action="recruit-hero" data-class-id="${cls.id}" data-action-key="${actionKey}">${pending ? 'Recruiting...' : 'Recruit'}</button>
    </div>`
  }).join('')

  const upgradesHtml = s.upgrades.map((u) => {
    const cost = u.cost ?? []
    const canBuy = s.canAffordCost(cost) && u.tier < u.max_tier
    const actionKey = getActionKey('buy-upgrade', u.id)
    const pending = pendingActions.has(actionKey)
    return `<div class="card" style="display:flex;justify-content:space-between;align-items:center">
      <div>
        <div style="font-weight:600;font-size:12px">${u.icon??'⬆️'} ${u.label} ${u.max_tier>1?`(${u.tier}/${u.max_tier})`:''}</div>
        <div style="font-size:10px;color:#666680">${u.description||''}</div>
      </div>
      <button class="btn ${canBuy && !pending ? 'btn-primary' : 'btn-ghost'}" ${canBuy && !pending ? '' : 'disabled'} data-action="buy-upgrade" data-upgrade-id="${u.id}" data-action-key="${actionKey}">
        ${pending ? 'Buying...' : (u.tier>=u.max_tier?'✓ Max':cost.map(c=>s.fmt(c.amount)+' '+(s.resources.find(r=>r.id===c.resource_id)?.label??c.resource_id)).join(' + ')||'Buy')}
      </button>
    </div>`
  }).join('')

  const empty = !buildingsHtml && !recruitHtml && !upgradesHtml
  el.innerHTML = `<h2 style="font-size:15px;font-weight:700;margin-bottom:12px;color:#e0e0f0">World</h2>
    ${empty ? `<div style="color:#444460;font-size:12px;margin-top:24px;text-align:center"><div style="font-size:24px;margin-bottom:8px">🏚️</div>No visible content yet.<br><br>In the editor, make sure your nodes have no unlock_conditions so they appear immediately.</div>` : ''}
    ${buildingsHtml ? `<div style="font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:#444460;margin-bottom:8px">Buildings</div>${buildingsHtml}` : ''}
    ${recruitHtml ? `<div style="font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:#444460;margin:12px 0 8px">Recruit</div>${recruitHtml}` : ''}
    ${upgradesHtml ? `<div style="font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:#444460;margin:12px 0 8px">Upgrades</div>${upgradesHtml}` : ''}`
}

// ── Expedition screen ─────────────────────────────────────────────────────────
function renderExpeditionScreen(s) {
  const el = document.getElementById('screen-expedition')
  ensureExpeditionActionDelegation()
  const expeditionHash = buildExpeditionRenderHash(s)
  if (renderCache.expeditionHash === expeditionHash) return
  renderCache.expeditionHash = expeditionHash
  const activeRun = s.activeRuns.find((r) => !r.done)

  const activeRunHtml = activeRun ? (() => {
    const exp = s.expeditions.find((e) => e.id === activeRun.expedition_id)
    const pct = Math.min(100, (activeRun.elapsed_s / activeRun.total_s) * 100)
    const bossHpPct = activeRun.boss_hp_max ? Math.round((activeRun.boss_hp / activeRun.boss_hp_max) * 100) : null
    const pendingHtml = activeRun.pending_event ? `<div style="background:#2a2a1e;border:1px solid #BA751766;border-radius:8px;padding:10px;margin-top:8px">
      <div style="font-size:12px;font-weight:600;color:#EF9F27;margin-bottom:8px">⚡ ${activeRun.pending_event.event_def.label}</div>
      <div style="display:flex;gap:6px;flex-wrap:wrap">
        ${(activeRun.pending_event.event_def.choices??[]).map((c,i)=>`<button class="btn btn-ghost" data-action="resolve-event-choice" data-run-id="${activeRun.run_id}" data-choice-index="${i}">${c.label}</button>`).join('')}
      </div></div>` : ''
    return `<div class="card" style="border-color:#7F77DD44;margin-bottom:16px">
      <div style="display:flex;justify-content:space-between;margin-bottom:8px">
        <span style="font-weight:700">${exp?.icon??'⚔️'} ${exp?.label??'Expedition'}</span>
        <span style="font-size:11px;color:#666680">${Math.floor(activeRun.elapsed_s)}s / ${activeRun.total_s}s</span>
      </div>
      <div class="progress-bar-outer" style="margin-bottom:8px"><div class="progress-bar-inner" style="width:${pct}%;background:#7F77DD"></div></div>
      ${bossHpPct!==null?`<div style="font-size:10px;color:#E24B4A;margin-bottom:4px">Boss HP</div><div class="progress-bar-outer" style="margin-bottom:8px"><div class="progress-bar-inner" style="width:${bossHpPct}%;background:#E24B4A"></div></div>`:''}
      ${pendingHtml}
      <div style="max-height:140px;overflow-y:auto;margin-top:8px">
        ${activeRun.log.slice().reverse().map((l)=>`<div style="font-size:11px;color:#666680;padding:2px 0;border-bottom:1px solid #1e1e2e">${l.text}</div>`).join('')}
      </div>
    </div>`
  })() : ''

  const expedHtml = s.expeditions.map((exp) => {
    const onRun = s.activeRuns.some((r) => !r.done)
    const readyHeroes = s.heroes.filter((h) => h.status === 'ready')
    const canSend = !onRun && readyHeroes.length > 0
    const actionKey = getActionKey('start-expedition', exp.id)
    const pending = pendingActions.has(actionKey)
    return `<div class="card">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">
        <div>
          <span style="font-weight:600">${exp.icon??'🗺️'} ${exp.label}</span>
          ${exp.type==='boss_expedition'?'<span class="badge" style="background:#E24B4A22;color:#E24B4A;border:1px solid #E24B4A44;margin-left:6px">BOSS</span>':''}
        </div>
        <span style="font-size:11px;color:#666680">${exp.duration_s}s · ${Math.round((exp.base_success_chance??0.75)*100)}% base</span>
      </div>
      <div style="font-size:11px;color:#666680;margin-bottom:8px">${exp.description||''}</div>
      <button class="btn ${canSend && !pending ? 'btn-primary' : 'btn-ghost'}" ${canSend && !pending ? '' : 'disabled'} data-action="start-expedition" data-expedition-id="${exp.id}" data-party-size="${exp.party_size}" data-action-key="${actionKey}">
        ${pending ? 'Sending...' : (onRun?'Run in progress':readyHeroes.length===0?'No heroes ready':`Send ${exp.party_size} heroes`)}
      </button>
    </div>`
  }).join('')

  el.innerHTML = `<h2 style="font-size:15px;font-weight:700;margin-bottom:12px">Expeditions</h2>
    ${activeRunHtml}
    ${expedHtml || '<div style="color:#444460;font-size:12px">No expeditions available yet.</div>'}`
}

// ── Forge screen ──────────────────────────────────────────────────────────────
function ensureWorldActionDelegation() {
  if (worldActionsBound) return
  const el = document.getElementById('screen-world')
  if (!el) return
  el.addEventListener('click', handleWorldActionClick)
  worldActionsBound = true
}

function ensureExpeditionActionDelegation() {
  if (expeditionActionsBound) return
  const el = document.getElementById('screen-expedition')
  if (!el) return
  el.addEventListener('click', handleExpeditionActionClick)
  expeditionActionsBound = true
}

function handleWorldActionClick(e) {
  const btn = e.target.closest('button[data-action]')
  if (!btn || btn.disabled || !e.currentTarget.contains(btn)) return

  const action = btn.dataset.action
  if (action === 'build-building') {
    queueAction(btn.dataset.actionKey || getActionKey(action, btn.dataset.buildingId), () => actions.buildBuilding(btn.dataset.buildingId))
  } else if (action === 'recruit-hero') {
    queueAction(btn.dataset.actionKey || getActionKey(action, btn.dataset.classId), () => actions.recruitHero(btn.dataset.classId))
  } else if (action === 'buy-upgrade') {
    queueAction(btn.dataset.actionKey || getActionKey(action, btn.dataset.upgradeId), () => actions.buyUpgrade(btn.dataset.upgradeId))
  }
}

function handleExpeditionActionClick(e) {
  const btn = e.target.closest('button[data-action]')
  if (!btn || btn.disabled || !e.currentTarget.contains(btn)) return

  const action = btn.dataset.action
  if (action === 'start-expedition') {
    const expeditionId = btn.dataset.expeditionId
    const partySize = Number(btn.dataset.partySize) || 0
    const readyHeroes = snapshot?.heroes
      .filter((h) => h.status === 'ready')
      .map((h) => h.id)
      .slice(0, partySize)
    queueAction(btn.dataset.actionKey || getActionKey(action, expeditionId), () => actions.startExpedition(expeditionId, readyHeroes))
  } else if (action === 'resolve-event-choice') {
    actions.resolveEventChoice(btn.dataset.runId, Number(btn.dataset.choiceIndex))
  }
}

function queueAction(actionKey, runAction) {
  if (!actionKey || pendingActions.has(actionKey)) return
  pendingActions.add(actionKey)
  if (snapshot) render(snapshot)

  const timer = setTimeout(() => {
    pendingActionTimers.delete(actionKey)
    try {
      runAction()
    } finally {
      pendingActions.delete(actionKey)
    }
  }, ACTION_DELAY_MS)

  pendingActionTimers.set(actionKey, timer)
}

function getActionKey(action, targetId) {
  return `${action}:${targetId}`
}

function buildWorldRenderHash(s) {
  return JSON.stringify({
    resources: s.resources.map((r) => ({ id: r.id, amount: r.amount, cap: r.cap, income: r.effective_income ?? r.income })),
    buildings: s.buildings.map((b) => ({
      id: b.id,
      visible: b.visible,
      level: b.level,
      max_level: b.max_level,
      is_crafting_station: b.is_crafting_station,
      levels: (b.levels ?? []).map((lvl) => ({
        build_cost: lvl.build_cost ?? [],
        build_time_s: lvl.build_time_s ?? 0,
        hero_slots: lvl.hero_slots ?? 0,
        recipe_slots: lvl.recipe_slots ?? 0,
        production: lvl.production ?? {},
      })),
    })),
    heroClasses: s.heroClasses.map((cls) => ({ id: cls.id, recruit_cost: cls.recruit_cost ?? [] })),
    upgrades: s.upgrades.map((u) => ({ id: u.id, tier: u.tier, max_tier: u.max_tier, cost: u.cost ?? [] })),
    pending: [...pendingActions].filter((key) =>
      key.startsWith('build-building:') || key.startsWith('recruit-hero:') || key.startsWith('buy-upgrade:')
    ),
  })
}

function buildExpeditionRenderHash(s) {
  return JSON.stringify({
    expeditions: s.expeditions.map((exp) => ({
      id: exp.id,
      party_size: exp.party_size,
      duration_s: exp.duration_s,
      visible: exp.visible,
      base_success_chance: exp.base_success_chance ?? 0,
    })),
    activeRuns: s.activeRuns.map((r) => ({
      run_id: r.run_id,
      expedition_id: r.expedition_id,
      elapsed_s: Math.floor(r.elapsed_s * 4),
      total_s: Math.floor(r.total_s * 4),
      done: r.done,
      pending_event: r.pending_event?.event_def?.label ?? null,
      log_len: r.log.length,
      boss_hp: r.boss_hp ?? null,
    })),
    heroes: s.heroes.map((h) => ({ id: h.id, status: h.status })),
    pending: [...pendingActions].filter((key) => key.startsWith('start-expedition:')),
  })
}

function renderForgeScreen(s) {
  const el = document.getElementById('screen-forge')
  const stations = s.buildings.filter((b) => b.is_crafting_station && b.level > 0)
  const invHtml = s.inventory.length
    ? s.inventory.map((i) => `<span class="badge rarity-${i.def?.rarity??'common'}" style="background:#1e1e2e;border:1px solid #2a2a3e;margin:2px">${i.def?.icon??'📦'} ${i.def?.label??i.id} ×${i.qty}</span>`).join('')
    : '<span style="color:#444460;font-size:11px">Empty</span>'
  const stationsHtml = stations.map((bld) => {
    const levelData = bld.levels[bld.level-1]
    const slots = levelData?.recipe_slots ?? 1
    return `<div class="card">
      <div style="font-weight:600;margin-bottom:6px">${bld.icon??'🔨'} ${bld.label} <span style="font-size:10px;color:#666680">${bld.craft_queue.length}/${slots} slots</span></div>
      ${bld.craft_queue.map((job)=>{
        const pct = Math.min(100,(job.progress_s/job.total_s)*100)
        return `<div style="margin-bottom:6px"><div style="font-size:11px;color:#8888aa;margin-bottom:3px">${job.recipe_id}</div><div class="progress-bar-outer"><div class="progress-bar-inner" style="width:${pct}%;background:#BA7517"></div></div></div>`
      }).join('') || '<div style="font-size:11px;color:#444460">Queue empty</div>'}
    </div>`
  }).join('')
  el.innerHTML = `<h2 style="font-size:15px;font-weight:700;margin-bottom:12px">Forge</h2>
    <div style="font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:#444460;margin-bottom:8px">Inventory</div>
    <div style="margin-bottom:16px;display:flex;flex-wrap:wrap;gap:4px">${invHtml}</div>
    ${stations.length ? `<div style="font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:#444460;margin-bottom:8px">Crafting stations</div>${stationsHtml}` : '<div style="color:#444460;font-size:12px">No crafting stations built yet.</div>'}`
}
</script>
